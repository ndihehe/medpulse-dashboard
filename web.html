<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>MedPulse IoT Dashboard</title>
	<script>
		tailwind = {
			config: {
				darkMode: 'class',
				theme: {
					extend: {
						fontFamily: {
							sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui'],
						},
						boxShadow: {
							soft: '0 18px 50px rgba(15, 23, 42, 0.08)',
							glow: '0 0 0 1px rgba(59, 130, 246, 0.12), 0 20px 40px rgba(56, 189, 248, 0.12)',
						},
						colors: {
							brand: {
								50: '#eff8ff',
								100: '#dff2ff',
								200: '#b9e6ff',
								300: '#7ed3ff',
								400: '#4bb9ff',
								500: '#2196ff',
								600: '#157be6',
								700: '#115fb8',
							},
							mint: {
								50: '#effcf4',
								100: '#d9f8e5',
								200: '#b7efd0',
								300: '#86e0b1',
								400: '#4fca8a',
								500: '#20b46d',
							},
						},
						keyframes: {
							floaty: {
								'0%, 100%': { transform: 'translateY(0px)' },
								'50%': { transform: 'translateY(-6px)' },
							},
							pulseDanger: {
								'0%, 100%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(239, 68, 68, 0.45)' },
								'50%': { transform: 'scale(1.02)', boxShadow: '0 0 0 18px rgba(239, 68, 68, 0)' },
							},
							shimmer: {
								'0%': { backgroundPosition: '-150% 0' },
								'100%': { backgroundPosition: '150% 0' },
							},
							slideIn: {
								'0%': { opacity: '0', transform: 'translateY(14px)' },
								'100%': { opacity: '1', transform: 'translateY(0)' },
							},
							pop: {
								'0%': { opacity: '0', transform: 'scale(0.94)' },
								'100%': { opacity: '1', transform: 'scale(1)' },
							},
						},
						animation: {
							floaty: 'floaty 7s ease-in-out infinite',
							pulseDanger: 'pulseDanger 1.2s ease-in-out infinite',
							shimmer: 'shimmer 1.3s linear infinite',
							slideIn: 'slideIn 0.45s ease-out both',
							pop: 'pop 0.24s ease-out both',
						},
					},
				},
			},
		};
	</script>
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
	<style>
		:root {
			--bg: 249 250 255;
			--panel: 255 255 255;
			--panel-2: 244 248 252;
			--text: 15 23 42;
			--muted: 96 110 132;
			--border: 226 232 240;
			--shadow: 15 23 42;
		}
		.dark {
			--bg: 8 15 30;
			--panel: 13 21 36;
			--panel-2: 17 28 47;
			--text: 238 243 255;
			--muted: 148 163 184;
			--border: 35 47 72;
			--shadow: 0 0 0;
		}
		html, body {
			height: 100%;
		}
		body {
			margin: 0;
			font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui;
			background:
				radial-gradient(circle at top left, rgba(59, 130, 246, 0.14), transparent 28%),
				radial-gradient(circle at top right, rgba(32, 180, 109, 0.12), transparent 24%),
				linear-gradient(180deg, rgb(var(--bg)) 0%, rgb(var(--bg)) 100%);
			color: rgb(var(--text));
			transition: background 0.35s ease, color 0.35s ease;
		}
		.glass {
			background: rgba(var(--panel), 0.78);
			backdrop-filter: blur(18px);
			-webkit-backdrop-filter: blur(18px);
			border: 1px solid rgba(var(--border), 0.55);
		}
		.card {
			background: rgb(var(--panel));
			border: 1px solid rgba(var(--border), 0.7);
			box-shadow: 0 18px 40px rgba(15, 23, 42, 0.06);
		}
		.soft-grid {
			background-image:
				linear-gradient(to right, rgba(148,163,184,0.12) 1px, transparent 1px),
				linear-gradient(to bottom, rgba(148,163,184,0.12) 1px, transparent 1px);
			background-size: 20px 20px;
		}
		.noise {
			position: absolute;
			inset: 0;
			opacity: 0.16;
			mix-blend-mode: soft-light;
			pointer-events: none;
			background-image: radial-gradient(rgba(255,255,255,0.95) 0.6px, transparent 0.6px);
			background-size: 12px 12px;
		}
		.table-scroll::-webkit-scrollbar,
		.hide-scrollbar::-webkit-scrollbar {
			height: 10px;
			width: 10px;
		}
		.table-scroll::-webkit-scrollbar-thumb,
		.hide-scrollbar::-webkit-scrollbar-thumb {
			background: rgba(148, 163, 184, 0.35);
			border-radius: 999px;
		}
		.sticky-blur {
			background: rgba(var(--bg), 0.72);
			backdrop-filter: blur(14px);
		}
		.pulse-critical {
			animation: pulseDanger 1.2s ease-in-out infinite;
		}
		.skeleton {
			background: linear-gradient(90deg, rgba(148,163,184,0.12) 25%, rgba(148,163,184,0.22) 37%, rgba(148,163,184,0.12) 63%);
			background-size: 400% 100%;
		}
	</style>
</head>
<body class="text-slate-900 dark:text-slate-100">
	<div id="app"></div>

	<script src="https://unpkg.com/lucide@latest"></script>
	<script>
		const STORAGE_KEY = 'medpulse-dashboard-v1';
		const THEME_KEY = 'medpulse-theme';
		const DEMO_PASSWORD = 'demo123';

		const state = {
			authed: false,
			screen: 'landing',
			view: 'dashboard',
			sidebarOpen: true,
			darkMode: window.matchMedia('(prefers-color-scheme: dark)').matches,
			notificationsOpen: false,
			profileOpen: false,
			settingsOpen: false,
			alertModal: null,
			toastQueue: [],
			alertHistory: {},
			selectedPatientId: null,
			search: '',
			filter: 'all',
			sort: 'risk',
			page: 1,
			pageSize: 8,
			loading: true,
			realtime: true,
			kioskStatus: 'online',
			mqttStatus: 'connected',
			wifiStatus: 'stable',
			inputName: '',
			inputEmail: '',
			loginPin: '',
			loginMode: 'staff',
			historyRange: '7d',
			dateRange: '24h',
			floorFocus: 'north-wing',
			soundEnabled: true,
		};

		let patients = [];

		// Hàm tiện ích (dùng cho biểu đồ & UI, không còn sinh dữ liệu ảo)
		function rand(min, max) { return Math.random() * (max - min) + min; }
		function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }

		function enqueueAlert(patient, type, options = {}) {
			const { showModal = true, cooldownMs = 0 } = options;
			const now = Date.now();
			const lastAlertAt = state.alertHistory[patient.id] || 0;
			if (cooldownMs && now - lastAlertAt < cooldownMs) {
				return;
			}
			state.alertHistory = {
				...state.alertHistory,
				[patient.id]: now,
			};
			const alert = {
				id: `${now}-${Math.random().toString(16).slice(2)}`,
				type,
				patient,
				time: new Date(),
				kiosk: patient.kiosk,
			};
			if (showModal && (!state.alertModal || state.alertModal.patient.id !== patient.id)) {
				state.alertModal = alert;
			}
			state.toastQueue.unshift({
				id: alert.id,
				title: type === 'critical' ? 'Cảnh báo khẩn cấp' : 'Cập nhật trạng thái',
				message: `${patient.name} tại ${patient.kiosk}`,
				tone: type === 'critical' ? 'danger' : 'info',
			});
			state.toastQueue = state.toastQueue.slice(0, 3);
			playAlarmTone();
			render();
			setTimeout(() => {
				if (state.alertModal && state.alertModal.id === alert.id) state.alertModal = null;
				render();
			}, 5200);
		}

		function playAlarmTone() {
			if (!state.soundEnabled) return;
			try {
				const AudioContextClass = window.AudioContext || window.webkitAudioContext;
				if (!AudioContextClass) return;
				const context = new AudioContextClass();
				const oscillator = context.createOscillator();
				const gain = context.createGain();
				oscillator.type = 'sine';
				oscillator.frequency.setValueAtTime(880, context.currentTime);
				oscillator.frequency.exponentialRampToValueAtTime(520, context.currentTime + 0.18);
				gain.gain.setValueAtTime(0.0001, context.currentTime);
				gain.gain.exponentialRampToValueAtTime(0.08, context.currentTime + 0.05);
				gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.5);
				oscillator.connect(gain);
				gain.connect(context.destination);
				oscillator.start();
				oscillator.stop(context.currentTime + 0.52);
			} catch (error) {
			}
		}

		function getVisiblePatients() {
			let items = [...patients];
			if (state.search.trim()) {
				const keyword = state.search.trim().toLowerCase();
				items = items.filter((patient) =>
					[patient.name, patient.id, patient.room, patient.kiosk].join(' ').toLowerCase().includes(keyword)
				);
			}
			if (state.filter !== 'all') {
				items = items.filter((patient) => patient.status === state.filter);
			}
			if (state.sort === 'name') {
				items.sort((left, right) => left.name.localeCompare(right.name, 'vi'));
			} else if (state.sort === 'heartRate') {
				items.sort((left, right) => right.heartRate - left.heartRate);
			} else if (state.sort === 'risk') {
				items.sort((left, right) => right.riskScore - left.riskScore);
			} else if (state.sort === 'updated') {
				items.sort((left, right) => right.lastUpdate - left.lastUpdate);
			}
			return items;
		}

		function currentPatient() {
			return patients.find((patient) => patient.id === state.selectedPatientId) || patients[0];
		}

		function linePath(series, width, height, padding = 16) {
			const min = Math.min(...series);
			const max = Math.max(...series);
			const span = max - min || 1;
			const innerWidth = width - padding * 2;
			const innerHeight = height - padding * 2;
			return series.map((value, index) => {
				const x = padding + (index / (series.length - 1)) * innerWidth;
				const y = padding + (1 - (value - min) / span) * innerHeight;
				return [Number(x.toFixed(1)), Number(y.toFixed(1))];
			});
		}

		function chartCard(title, series, unit, accent, extra = '') {
			const width = 760;
			const height = 240;
			const points = linePath(series, width, height, 24);
			const path = points.map((point, index) => `${index === 0 ? 'M' : 'L'} ${point[0]} ${point[1]}`).join(' ');
			const fill = `${path} L ${width - 24} ${height - 24} L 24 ${height - 24} Z`;
			const min = Math.min(...series);
			const max = Math.max(...series);
			return `
				<div class="card rounded-[28px] p-5 md:p-6 shadow-soft animate-slideIn">
					<div class="flex items-start justify-between gap-4 mb-4">
						<div>
							<div class="text-sm font-semibold text-slate-500 dark:text-slate-400">${title}</div>
							<div class="mt-1 text-2xl font-extrabold tracking-tight">${series[series.length - 1]}<span class="ml-1 text-sm font-semibold text-slate-500">${unit}</span></div>
						</div>
						<div class="text-right">
							<div class="text-xs uppercase tracking-[0.24em] text-slate-400">Độ biến thiên</div>
							<div class="mt-1 text-sm font-semibold ${accent}">${extra || `${min} - ${max} ${unit}`}</div>
						</div>
					</div>
					<svg viewBox="0 0 ${width} ${height}" class="w-full h-56 rounded-[24px] bg-gradient-to-b from-slate-50/80 to-white dark:from-slate-900/70 dark:to-slate-950 overflow-hidden">
						<defs>
							<linearGradient id="${title.replace(/\s+/g, '-')}-line" x1="0" x2="1" y1="0" y2="0">
								<stop offset="0%" stop-color="${accent.includes('emerald') ? '#20b46d' : accent.includes('red') ? '#ef4444' : '#2196ff'}" />
								<stop offset="100%" stop-color="${accent.includes('emerald') ? '#86efac' : accent.includes('red') ? '#f97316' : '#67e8f9'}" />
							</linearGradient>
							<linearGradient id="${title.replace(/\s+/g, '-')}-fill" x1="0" x2="0" y1="0" y2="1">
								<stop offset="0%" stop-color="${accent.includes('emerald') ? 'rgba(32,180,109,0.26)' : accent.includes('red') ? 'rgba(239,68,68,0.24)' : 'rgba(33,150,255,0.22)'}" />
								<stop offset="100%" stop-color="rgba(33,150,255,0.02)" />
							</linearGradient>
						</defs>
						<g opacity="0.52">
							${Array.from({ length: 5 }).map((_, index) => `<line x1="24" y1="${24 + index * 42}" x2="736" y2="${24 + index * 42}" stroke="rgba(148,163,184,0.12)" />`).join('')}
						</g>
						<path d="${fill}" fill="url(#${title.replace(/\s+/g, '-')}-fill)" />
						<path d="${path}" fill="none" stroke="url(#${title.replace(/\s+/g, '-')}-line)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
						${points.map((point) => `<circle cx="${point[0]}" cy="${point[1]}" r="4.5" fill="#fff" stroke="url(#${title.replace(/\s+/g, '-')}-line)" stroke-width="3" />`).join('')}
					</svg>
				</div>
			`;
		}

		function progressBar(value, max, tone = 'brand') {
			const pct = Math.round((value / max) * 100);
			const toneClass = tone === 'danger'
				? 'from-red-500 to-orange-500'
				: tone === 'warning'
					? 'from-amber-400 to-yellow-400'
					: tone === 'mint'
						? 'from-emerald-400 to-green-500'
						: 'from-brand-400 to-cyan-400';
			return `
				<div class="h-2.5 w-full rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
					<div class="h-full rounded-full bg-gradient-to-r ${toneClass}" style="width:${pct}%"></div>
				</div>
			`;
		}

		function normalizeFirmwareStatus(value) {
			const status = String(value || '').trim().toUpperCase();
			return ['IDLE', 'FALLING', 'IMPACT', 'MOTIONLESS', 'ALERT'].includes(status) ? status : 'IDLE';
		}

		function isNormalFirmwareStatus(value) {
			return normalizeFirmwareStatus(value) === 'IDLE';
		}

		function isTransitionFirmwareStatus(value) {
			const status = normalizeFirmwareStatus(value);
			return status === 'FALLING' || status === 'IMPACT' || status === 'MOTIONLESS';
		}

		function isCriticalFirmwareStatus(value) {
			return normalizeFirmwareStatus(value) === 'ALERT';
		}

		function firmwareStatusLabel(value) {
			const labels = {
				IDLE: 'Bình thường',
				FALLING: 'Đang ngã',
				IMPACT: 'Va chạm',
				MOTIONLESS: 'Bất động',
				ALERT: 'Té ngã xác nhận',
			};
			return labels[normalizeFirmwareStatus(value)] || labels.IDLE;
		}

		function firmwareStatusBadgeClass(value) {
			const classes = {
				IDLE: 'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200 dark:bg-emerald-500/10 dark:text-emerald-300 dark:ring-emerald-500/20',
				FALLING: 'bg-amber-50 text-amber-700 ring-1 ring-amber-200 dark:bg-amber-500/10 dark:text-amber-300 dark:ring-amber-500/20',
				IMPACT: 'bg-orange-50 text-orange-700 ring-1 ring-orange-200 dark:bg-orange-500/10 dark:text-orange-300 dark:ring-orange-500/20',
				MOTIONLESS: 'bg-slate-100 text-slate-700 ring-1 ring-slate-200 dark:bg-slate-500/10 dark:text-slate-300 dark:ring-slate-500/20',
				ALERT: 'bg-red-50 text-red-700 ring-1 ring-red-200 dark:bg-red-500/10 dark:text-red-300 dark:ring-red-500/20',
			};
			return classes[normalizeFirmwareStatus(value)] || classes.IDLE;
		}

		function normalizeFilterValue(value) {
			const filter = String(value || 'all').trim();
			return ['all', 'IDLE', 'FALLING', 'IMPACT', 'MOTIONLESS', 'ALERT'].includes(filter) ? filter : 'all';
		}

		function statusBadge(value) {
			return `<span class="inline-flex items-center gap-1.5 rounded-full px-3 py-1 text-xs font-bold ${firmwareStatusBadgeClass(value)}"><span class="h-1.5 w-1.5 rounded-full bg-current"></span>${firmwareStatusLabel(value)}</span>`;
		}

		function iconCircle(name, tone = 'brand') {
			const theme = {
				brand: 'bg-brand-50 text-brand-700 dark:bg-brand-500/10 dark:text-brand-300',
				mint: 'bg-emerald-50 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-300',
				amber: 'bg-amber-50 text-amber-700 dark:bg-amber-500/10 dark:text-amber-300',
				red: 'bg-red-50 text-red-700 dark:bg-red-500/10 dark:text-red-300',
				slate: 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-200',
			};
			return `<span class="inline-flex h-11 w-11 items-center justify-center rounded-2xl ${theme[tone] || theme.brand}"><i data-lucide="${name}" class="h-5 w-5"></i></span>`;
		}

		function renderLanding() {
			return `
				<div class="relative min-h-screen overflow-hidden">
					<div class="absolute inset-0 soft-grid opacity-[0.14]"></div>
					<div class="noise"></div>
					<div class="relative mx-auto flex min-h-screen max-w-7xl flex-col justify-between px-4 py-5 sm:px-6 lg:px-8">
						<header class="glass rounded-[28px] px-5 py-4 shadow-soft">
							<div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
								<div class="flex items-center gap-3">
									<div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-brand-500 to-cyan-400 text-white shadow-glow">
										<i data-lucide="activity" class="h-6 w-6"></i>
									</div>
									<div>
										<div class="text-lg font-extrabold tracking-tight">MedPulse IoT</div>
										<div class="text-sm text-slate-500 dark:text-slate-400">Nền tảng giám sát bệnh nhân realtime cho bệnh viện và viện dưỡng lão</div>
									</div>
								</div>
								<div class="flex flex-wrap items-center gap-3">
									<button data-action="toggle-theme" class="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 shadow-sm transition hover:-translate-y-0.5 hover:shadow-soft dark:border-slate-800 dark:bg-slate-900 dark:text-slate-200">
										<i data-lucide="moon-star" class="h-4 w-4"></i><span>Dark mode</span>
									</button>
									<button data-action="show-login" class="inline-flex items-center gap-2 rounded-2xl bg-slate-950 px-4 py-2.5 text-sm font-semibold text-white shadow-soft transition hover:-translate-y-0.5 hover:bg-slate-800 dark:bg-white dark:text-slate-950">
										<i data-lucide="log-in" class="h-4 w-4"></i><span>Đăng nhập demo</span>
									</button>
								</div>
							</div>
						</header>

						<main class="grid flex-1 gap-6 py-6 lg:grid-cols-[1.2fr_0.8fr] lg:items-center">
							<section class="space-y-8 animate-slideIn">
								<div class="inline-flex items-center gap-2 rounded-full border border-brand-200 bg-white/80 px-4 py-2 text-sm font-semibold text-brand-700 shadow-sm backdrop-blur dark:border-brand-500/20 dark:bg-slate-900/70 dark:text-brand-300">
									<span class="h-2 w-2 rounded-full bg-mint-500 animate-pulse"></span>
									Realtime monitoring, alerts, analytics, kiosk visibility
								</div>
								<div class="max-w-3xl space-y-5">
									<h1 class="text-4xl font-black tracking-tight text-slate-900 sm:text-5xl lg:text-6xl dark:text-white">
										Dashboard y tế IoT hiện đại để y tá nhìn nhanh, bác sĩ ra quyết định ngay.
									</h1>
									<p class="max-w-2xl text-lg leading-8 text-slate-600 dark:text-slate-300">
										Giao diện được thiết kế như một sản phẩm health-tech thực chiến: số liệu sống, cảnh báo nổi bật, timeline lâm sàng, bản đồ khu vực và phân tích AI hỗ trợ trực quan.
									</p>
								</div>
								<div class="grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
									${[
										{ title: 'Bệnh nhân realtime', value: 'Live', desc: 'Kết nối từ RFID + Cloud', tone: 'brand' },
										{ title: 'Cảnh báo khẩn', value: '3', desc: 'Fall / SpO₂ / signal', tone: 'red' },
										{ title: 'MQTT latency', value: '120ms', desc: 'Stable channel', tone: 'mint' },
										{ title: 'Kiosk online', value: '98.4%', desc: 'Nurse stations healthy', tone: 'amber' },
									].map((item) => `
										<div class="card rounded-[28px] p-5 shadow-soft transition duration-300 hover:-translate-y-1">
											<div class="flex items-start justify-between gap-3">
												<div>
													<div class="text-sm font-semibold text-slate-500 dark:text-slate-400">${item.title}</div>
													<div class="mt-2 text-3xl font-black tracking-tight">${item.value}</div>
													<div class="mt-2 text-sm text-slate-500 dark:text-slate-400">${item.desc}</div>
												</div>
												${iconCircle(item.tone === 'red' ? 'shield-alert' : item.tone === 'mint' ? 'wifi' : item.tone === 'amber' ? 'square-stack' : 'users-round', item.tone)}
											</div>
										</div>
									`).join('')}
								</div>

							<div class="flex h-14 w-14 items-center justify-center rounded-[24px] bg-red-600 text-white pulse-critical"><i data-lucide="triangle-alert" class="h-7 w-7"></i></div>
							<div class="flex-1">
								<div class="text-sm font-semibold uppercase tracking-[0.24em] text-red-500">Emergency alert</div>
								<div class="mt-1 text-3xl font-black tracking-tight text-slate-900 dark:text-white">${state.alertModal.patient.name}</div>
								<div class="mt-2 text-base leading-7 text-slate-600 dark:text-slate-300">${state.alertModal.type === 'critical' ? 'Phát hiện sự kiện khẩn cấp: té ngã, mất tín hiệu hoặc sinh hiệu bất thường.' : 'Cảnh báo cần kiểm tra ngay.'}</div>
								<div class="mt-4 grid gap-3 sm:grid-cols-3">
									<div class="rounded-[22px] bg-red-50 p-4 dark:bg-red-500/10"><div class="text-xs font-bold uppercase tracking-[0.18em] text-red-500">Time</div><div class="mt-2 font-black">${formatTime(state.alertModal.time)}</div></div>
									<div class="rounded-[22px] bg-red-50 p-4 dark:bg-red-500/10"><div class="text-xs font-bold uppercase tracking-[0.18em] text-red-500">Kiosk</div><div class="mt-2 font-black">${state.alertModal.kiosk}</div></div>
									<div class="rounded-[22px] bg-red-50 p-4 dark:bg-red-500/10"><div class="text-xs font-bold uppercase tracking-[0.18em] text-red-500">Room</div><div class="mt-2 font-black">${state.alertModal.patient.room}</div></div>
								</div>
							</div>
							<button data-action="dismiss-alert" class="rounded-2xl p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700 dark:hover:bg-slate-900 dark:hover:text-slate-200"><i data-lucide="x" class="h-5 w-5"></i></button>
						</div>
					</div>
				</div>
			` : '';

			return `
				${profileMenu}
				${notificationsPanel}
				${alertModal}
				<div class="fixed bottom-4 right-4 z-40 flex flex-col gap-3 sm:bottom-6 sm:right-6 lg:bottom-8 lg:right-8">
					${notifications}
				</div>
			`;
		}

		function escapeHtml(value) {
			return String(value || '')
				.replaceAll('&', '&amp;')
				.replaceAll('<', '&lt;')
				.replaceAll('>', '&gt;')
				.replaceAll('"', '&quot;')
				.replaceAll("'", '&#39;');
		}

		function render() {
			const app = document.getElementById('app');
			const contentMap = {
				dashboard: renderOverview(),
				patients: renderPatients(),
				detail: renderPatientDetail(),
				history: renderHistory(),
				settings: renderSettings(),
			};

			let output;
			if (!state.authed) {
				output = state.screen === 'login' ? renderLogin() : renderLanding();
			} else {
				output = renderAppShell(contentMap[state.view] || renderOverview());
			}

			if (state.loading) {
				output = `
					<div class="min-h-screen px-4 py-6 sm:px-6 lg:px-8">
						<div class="card mx-auto max-w-7xl rounded-[34px] p-6 shadow-soft">
							<div class="grid gap-4 md:grid-cols-4">
								${Array.from({ length: 8 }).map(() => `
									<div class="rounded-[26px] border border-slate-200 p-5 dark:border-slate-800">
										<div class="skeleton animate-shimmer h-4 w-1/2 rounded-full"></div>
										<div class="skeleton animate-shimmer mt-4 h-8 w-2/3 rounded-full"></div>
										<div class="skeleton animate-shimmer mt-3 h-3 w-full rounded-full"></div>
										<div class="skeleton animate-shimmer mt-2 h-3 w-5/6 rounded-full"></div>
									</div>
								`).join('')}
							</div>
						</div>
					</div>
				`;
			}

			app.innerHTML = output;
			applyTheme();
			if (window.lucide) lucide.createIcons();
			bindEvents();
		}

		function applyTheme() {
			document.documentElement.classList.toggle('dark', state.darkMode);
			localStorage.setItem(THEME_KEY, state.darkMode ? 'dark' : 'light');
		}

		function showToast(title, message, tone = 'info') {
			const toast = { id: `${Date.now()}-${Math.random().toString(16).slice(2)}`, title, message, tone, time: new Date() };
			state.toastQueue.unshift(toast);
			state.toastQueue = state.toastQueue.slice(0, 5);
			render();
			setTimeout(() => {
				state.toastQueue = state.toastQueue.filter((item) => item.id !== toast.id);
				render();
			}, 4200);
		}

		function bindEvents() {
			const app = document.getElementById('app');
			app.querySelectorAll('[data-bind]').forEach((element) => {
				element.addEventListener('input', (event) => {
					state[element.dataset.bind] = event.target.value;
					if (element.dataset.bind === 'pageSize') state.page = 1;
					render();
				});
			});
			app.querySelectorAll('select[data-bind]').forEach((element) => {
				element.addEventListener('change', (event) => {
					state[element.dataset.bind] = event.target.value;
					if (element.dataset.bind === 'pageSize') state.page = 1;
					render();
				});
			});
			app.querySelectorAll('[data-action]').forEach((element) => {
				element.addEventListener('click', (event) => {
					const action = element.dataset.action;
					const view = element.dataset.view;
					const id = element.dataset.id;
					const range = element.dataset.range;
					const page = element.dataset.page;
					if (action === 'toggle-theme') {
						state.darkMode = !state.darkMode;
						applyTheme();
						render();
					}
					if (action === 'show-login') {
						state.screen = 'login';
						render();
					}
					if (action === 'show-landing') {
						state.screen = 'landing';
						state.authed = false;
						render();
					}
					if (action === 'demo-login') {
						state.authed = true;
						state.screen = 'app';
						state.loading = false;
						state.profileOpen = false;
						state.notificationsOpen = false;
						showToast('Chào mừng', 'Đăng nhập thành công vào MedPulse.', 'info');
						initMedPulseWebSocket();
						render();
					}
					if (action === 'fill-demo') {
						state.inputName = 'nurse.le';
						state.loginPin = DEMO_PASSWORD;
						render();
					}
					if (action === 'toggle-sidebar') {
						state.sidebarOpen = !state.sidebarOpen;
						render();
					}
					if (action === 'toggle-profile') {
						state.profileOpen = !state.profileOpen;
						state.notificationsOpen = false;
						render();
					}
					if (action === 'toggle-notifications') {
						state.notificationsOpen = !state.notificationsOpen;
						state.profileOpen = false;
						render();
					}
					if (action === 'switch-view' && view) {
						state.view = view;
						state.profileOpen = false;
						state.notificationsOpen = false;
						state.sidebarOpen = window.innerWidth >= 1024;
						if (view === 'detail' && !state.selectedPatientId && patients.length > 0) state.selectedPatientId = patients[0].id;
						render();
					}
					if (action === 'open-patient' && id) {
						state.selectedPatientId = id;
						state.view = 'detail';
						state.profileOpen = false;
						state.notificationsOpen = false;
						render();
					}
					if (action === 'paginate' && page) {
						state.page = Number(page);
						render();
					}
					if (action === 'export-pdf') {
						window.print();
					}
					if (action === 'simulate-alert') {
						enqueueAlert(currentPatient(), 'critical', { showModal: true });
					}
					if (action === 'open-toast') {
						showToast('Synced', 'Dữ liệu realtime vừa được cập nhật từ MQTT.', 'info');
					}
					if (action === 'dismiss-alert') {
						state.alertModal = null;
						render();
					}
					if (action === 'dismiss-toast' && id) {
						state.toastQueue = state.toastQueue.filter((toast) => toast.id !== id);
						render();
					}
					if (action === 'toggle-sound') {
						state.soundEnabled = !state.soundEnabled;
						render();
					}
					if (action === 'set-range' && range) {
						state.historyRange = range;
						render();
					}
					if (action === 'logout') {
						state.authed = false;
						state.screen = 'landing';
						state.profileOpen = false;
						state.notificationsOpen = false;
						render();
					}
					event.preventDefault();
				});
			});
		}

		function bootstrap() {
			const savedTheme = localStorage.getItem(THEME_KEY);
			if (savedTheme) state.darkMode = savedTheme === 'dark';
			const saved = localStorage.getItem(STORAGE_KEY);
			if (saved) {
				try {
					const parsed = JSON.parse(saved);
					Object.assign(state, parsed);
					state.filter = normalizeFilterValue(state.filter);
					state.loading = true;
				} catch (error) {
				}
			}
			applyTheme();
			render();
			setTimeout(() => {
				state.loading = false;
				if (!state.authed) {
					state.screen = 'landing';
				}
				render();
			}, 900);
		document.addEventListener('click', (event) => {
				if (!event.target.closest('[data-action="toggle-profile"]')) {
					state.profileOpen = false;
				}
				if (!event.target.closest('[data-action="toggle-notifications"]')) {
					if (!event.target.closest('.fixed.right-4.top-20') && !event.target.closest('.fixed.right-6.top-20') && !event.target.closest('.fixed.right-8.top-20')) {
						state.notificationsOpen = false;
					}
				}
			});
			window.addEventListener('keydown', (event) => {
				if (event.key === 'Escape') {
					state.profileOpen = false;
					state.notificationsOpen = false;
					state.alertModal = null;
					render();
				}
			});
		}


		// WebSocket globals (phải ở scope ngoài để setInterval truy cập được)
		const BACKEND_WS_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
			? 'ws://localhost:5000'
			: 'wss://medpulse-dashboard.onrender.com';
		let socket = null;
		let reconnectTimer = null;

		function initMedPulseWebSocket() {
			if (socket && socket.readyState !== WebSocket.CLOSED) return;
			try { socket && socket.close(); } catch(e) {}

			socket = new WebSocket(BACKEND_WS_URL);

			socket.onopen = () => {
				console.log('🟢 WebSocket kết nối thành công tới Backend!');
				state.mqttStatus = 'connected';
				state.wifiStatus = 'stable';
				clearTimeout(reconnectTimer);
				render();
			};

			socket.onmessage = (event) => {
				try {
					const rawPayload = JSON.parse(event.data);

					// 1. Đồng bộ ban đầu khi load trang
					if (rawPayload.type === 'INITIAL_SYNC') {
						if (!rawPayload.data || rawPayload.data.length === 0) {
						patients = [];
						showToast('Hệ thống trực tuyến', 'Thiết bị sẵn sàng, vui lòng quẹt thẻ RFID để khởi tạo trạm giám sát...', 'info');
						} else {
						rawPayload.data.forEach(remotePatient => {
						const existingIdx = patients.findIndex(p => p.id === remotePatient.id);
						const mapped = {
						...remotePatient,
						avatar: (remotePatient.fullName || remotePatient.name || remotePatient.id).split(' ').slice(-2).map(p => p[0]).join('').toUpperCase(),
						name: remotePatient.fullName || remotePatient.name || remotePatient.id,
						room: remotePatient.roomNumber || remotePatient.room || '---',
						lastUpdate: new Date(remotePatient.lastUpdate),
						history: remotePatient.history || { heartRate: [], spo2: [], temp: [] },
						};
						if (existingIdx !== -1) Object.assign(patients[existingIdx], mapped);
						else patients.push(mapped);
						});
						}
						render();
						return;
					}

					// 2. Cập nhật thời gian thực từ ESP32
					if (rawPayload.type === 'PATIENT_UPDATE') {
						const liveData = rawPayload.data;
						const firmwareStatus = normalizeFirmwareStatus(liveData.status);
						const index = patients.findIndex(p => p.id === liveData.id);

						if (index === -1) {
						// Bệnh nhân MỚI → Append
						const newPatient = {
						...liveData,
						name: liveData.fullName || liveData.name || liveData.id,
						room: liveData.roomNumber || liveData.room || '---',
						avatar: (liveData.fullName || liveData.name || liveData.id).split(' ').slice(-2).map(p => p[0]).join('').toUpperCase(),
						status: firmwareStatus,
						lastUpdate: new Date(liveData.lastUpdate || Date.now()),
						history: { heartRate: [liveData.heartRate], spo2: [liveData.spo2], temp: [liveData.temp] },
						checkins: [{ type: 'Check-in', time: new Date(), place: liveData.roomNumber || liveData.room || '---' }],
						timeline: [{ label: 'Khởi tạo trạm', time: new Date(), note: 'Bệnh nhân quẹt thẻ RFID thành công' }],
						riskScore: liveData.riskScore || 0,
						alert: firmwareStatus !== 'IDLE',
						fall: firmwareStatus === 'ALERT',
						signalLost: !!liveData.signalLost,
						safe: firmwareStatus === 'IDLE',
						kiosk: liveData.kiosk || 'Kiosk 01',
						zone: firmwareStatus === 'IDLE' ? 'Within zone' : 'Alert zone',
						battery: liveData.battery || 100,
						rssi: liveData.rssi || -60,
						ble: liveData.signalLost ? 'Mất tín hiệu' : 'Ổn định',
						age: liveData.age || 0,
						gender: liveData.gender || '',
						};
						patients.push(newPatient);
						showToast('Bệnh nhân mới', `${newPatient.name} – ${newPatient.room} vừa được kết nối.`, 'info');
						if (!state.selectedPatientId) state.selectedPatientId = newPatient.id;
						} else {
						// Bệnh nhân ĐÃ CÓ → chỉ cập nhật vitals
						const oldData = patients[index];
						patients[index] = {
						...oldData,
						...liveData,
						name: liveData.fullName || liveData.name || oldData.name,
						room: liveData.roomNumber || liveData.room || oldData.room,
						status: firmwareStatus,
						history: {
						heartRate: [...(oldData.history?.heartRate || []).slice(-29), liveData.heartRate],
						spo2:      [...(oldData.history?.spo2 || []).slice(-29),      liveData.spo2],
						temp:      [...(oldData.history?.temp || []).slice(-29),      liveData.temp],
						},
						lastUpdate: new Date(liveData.lastUpdate || Date.now()),
						alert: firmwareStatus !== 'IDLE' || !!liveData.signalLost,
						fall: firmwareStatus === 'ALERT',
						safe: firmwareStatus === 'IDLE',
						zone: firmwareStatus === 'IDLE' ? 'Within zone' : 'Alert zone',
						ble: liveData.signalLost ? 'Mất tín hiệu' : ((liveData.battery || oldData.battery) < 20 ? 'Pin yếu' : 'Ổn định'),
						};
						if (firmwareStatus === 'ALERT') {
						enqueueAlert(patients[index], 'critical', { showModal: true, cooldownMs: 20000 });
						} else if (isTransitionFirmwareStatus(firmwareStatus)) {
						enqueueAlert(patients[index], 'warning', { showModal: false, cooldownMs: 30000 });
						} else if (liveData.signalLost) {
						enqueueAlert(patients[index], 'critical', { showModal: true, cooldownMs: 30000 });
						}
						}
						render();
					}
				} catch (error) {
					console.error('❌ Lỗi xử lý WebSocket:', error);
				}
			};

			socket.onclose = () => {
				console.warn('🔴 Mất kết nối WebSocket. Thử lại sau 5 giây...');
				state.mqttStatus = 'degraded';
				state.wifiStatus = 'unstable';
				render();
				clearTimeout(reconnectTimer);
				reconnectTimer = setTimeout(initMedPulseWebSocket, 5000);
			};

			socket.onerror = (err) => {
				console.error('❌ Lỗi WebSocket:', err);
			};
		}

		// Lưu localStorage + giữ kết nối WebSocket khi đã đăng nhập
		setInterval(() => {
			if (state.authed) {
				localStorage.setItem(STORAGE_KEY, JSON.stringify({
					authed: state.authed,
					screen: state.screen,
					view: state.view,
					selectedPatientId: state.selectedPatientId,
					darkMode: state.darkMode,
					soundEnabled: state.soundEnabled,
					historyRange: state.historyRange,
				}));
				if (!socket || socket.readyState === WebSocket.CLOSED) {
					initMedPulseWebSocket();
				}
			}
		}, 2600);


		bootstrap();
	</script>
</body>
</html>
