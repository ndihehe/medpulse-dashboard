<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>MedPulse IoT Dashboard</title>
	<script>
		tailwind = {
			config: {
				darkMode: 'class',
				theme: {
					extend: {
						fontFamily: {
							sans: ['"Segoe UI"', 'Roboto', 'sans-serif'],
						},
						boxShadow: {
							soft: '0 2px 8px rgba(26, 58, 92, 0.08)',
							glow: '0 0 0 1px rgba(30, 136, 229, 0.18), 0 6px 18px rgba(21, 101, 192, 0.16)',
						},
						colors: {
							brand: {
								50: '#e8f3fc',
								100: '#d2e7f8',
								200: '#a7cff1',
								300: '#73b4e9',
								400: '#42a0e3',
								500: '#1e88e5',
								600: '#1565c0',
								700: '#0d47a1',
								800: '#1a3a5c',
							},
						},
						keyframes: {
							pulseDanger: {
								'0%, 100%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(239, 68, 68, 0.45)' },
								'50%': { transform: 'scale(1.02)', boxShadow: '0 0 0 18px rgba(239, 68, 68, 0)' },
							},
						},
						animation: {
							pulseDanger: 'pulseDanger 1.2s ease-in-out infinite',
						},
					},
				},
			},
		};
	</script>
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
	<style>
		/* MedPulse design tokens: the single source of truth for the presentation layer. */
		:root {
			--color-primary: 21 101 192;
			--color-primary-light: 30 136 229;
			--color-primary-dark: 26 58 92;
			--color-success: 46 125 50;
			--color-warning: 245 124 0;
			--color-danger: 211 47 47;
			--bg: 255 255 255;
			--panel: 255 255 255;
			--panel-2: 240 244 248;
			--text: 26 58 92;
			--muted: 69 90 100;
			--border: 227 234 242;
			--shadow: 30 64 175;
			--radius-sm: 6px;
			--radius-md: 8px;
			--radius-lg: 8px;
			--brand: var(--color-primary);
			--safe: var(--color-success);
			--warning: var(--color-warning);
			--danger: var(--color-danger);
			--shadow-card: 0 2px 8px rgba(26, 58, 92, 0.08);
			--shadow-raised: 0 8px 24px rgba(13, 33, 55, 0.18);
			--focus-ring: 0 0 0 3px rgba(30, 136, 229, 0.22);
		}
		.dark {
			--bg: 2 6 23;
			--panel: 15 23 42;
			--panel-2: 30 41 59;
			--text: 241 245 249;
			--muted: 148 163 184;
			--border: 51 65 85;
			--shadow: 0 0 0;
			--shadow-card: 0 6px 20px rgba(0, 0, 0, 0.18);
			--shadow-raised: 0 12px 32px rgba(0, 0, 0, 0.28);
		}
		html, body {
			height: 100%;
		}
		body {
			margin: 0;
			overflow-x: hidden;
			font-family: 'Segoe UI', Roboto, sans-serif;
			background: rgb(var(--bg));
			color: rgb(var(--text));
			font-size: 14px;
			line-height: 1.5;
			-webkit-font-smoothing: antialiased;
			transition: background 0.35s ease, color 0.35s ease;
		}
		html:not(.dark) .text-slate-900 {
			color: rgb(var(--text)) !important;
		}
		html:not(.dark) :where(input, select, textarea) {
			background: rgb(var(--panel-2)) !important;
			border-color: rgb(var(--border)) !important;
			color: rgb(var(--text)) !important;
		}
		::selection {
			background: rgba(var(--color-primary-light), 0.22);
		}
		:where(button, a, input, select, textarea):focus-visible {
			outline: none;
			box-shadow: var(--focus-ring);
		}
		.glass {
			background: rgba(var(--panel), 0.96);
			backdrop-filter: blur(12px);
			-webkit-backdrop-filter: blur(12px);
			border: 1px solid rgb(var(--border));
		}
		.card {
			background: rgb(var(--panel));
			border: 1px solid rgb(var(--border));
			border-radius: var(--radius-md);
			box-shadow: var(--shadow-card);
		}
		.ui-card {
			background: rgb(var(--panel));
			border: 1px solid rgb(var(--border));
			border-radius: var(--radius-md);
			box-shadow: var(--shadow-card);
		}
		.ui-btn {
			display: inline-flex;
			min-height: 40px;
			align-items: center;
			justify-content: center;
			gap: 0.5rem;
			border-radius: var(--radius-sm);
			padding: 0.625rem 1rem;
			font-weight: 700;
			transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
		}
		.ui-btn:active { transform: translateY(1px); }
		.ui-btn-primary {
			border: 1px solid rgb(var(--color-primary));
			background: rgb(var(--color-primary));
			color: #fff;
		}
		.ui-btn-primary:hover { background: rgb(var(--color-primary-dark)); }
		.ui-btn-secondary {
			border: 1px solid rgb(var(--border));
			background: rgb(var(--panel-2));
			color: rgb(var(--color-primary));
		}
		.ui-btn-secondary:hover { background: rgb(var(--panel-2)); }
		.ui-badge {
			display: inline-flex;
			align-items: center;
			gap: 0.375rem;
			border-radius: 999px;
			padding: 0.25rem 0.625rem;
			font-size: 0.75rem;
			font-weight: 700;
		}
		.ui-badge-safe { background: rgba(var(--color-success), 0.1); color: rgb(var(--color-success)); }
		.ui-badge-warning { background: rgba(var(--color-warning), 0.13); color: #92400e; }
		.ui-badge-danger { background: rgba(var(--color-danger), 0.1); color: rgb(var(--color-danger)); }
		.ui-badge-info { background: rgba(var(--color-primary), 0.1); color: rgb(var(--color-primary-dark)); }
		.ui-alert {
			border: 1px solid rgba(var(--color-danger), 0.25);
			border-left: 4px solid rgb(var(--color-danger));
			border-radius: var(--radius-sm);
			background: rgba(var(--color-danger), 0.06);
			color: rgb(var(--text));
		}
		.ui-table { width: 100%; border-collapse: separate; border-spacing: 0; }
		.ui-table thead { background: rgb(var(--panel-2)); color: rgb(var(--color-primary-dark)); }
		.ui-table th { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
		.ui-table th, .ui-table td { border-bottom: 1px solid rgb(var(--border)); padding: 0.875rem 1rem; text-align: left; }
		.ui-table tbody tr:nth-child(even) { background: rgba(var(--panel-2), 0.46); }
		.ui-table tbody tr:hover { background: rgba(var(--color-primary), 0.05); }
		.noise {
			display: none;
		}
		.table-scroll::-webkit-scrollbar,
		.hide-scrollbar::-webkit-scrollbar {
			height: 10px;
			width: 10px;
		}
		.table-scroll::-webkit-scrollbar-thumb,
		.hide-scrollbar::-webkit-scrollbar-thumb {
			background: rgba(148, 163, 184, 0.35);
			border-radius: 999px;
		}
		.sticky-blur {
			background: rgba(var(--panel), 0.95);
			backdrop-filter: blur(10px);
		}
		.notification-toast {
			background: #ffffff;
			border: 1px solid #d6e2ef;
			box-shadow: 0 14px 36px rgba(13, 33, 55, 0.2);
			color: #1a3a5c;
			opacity: 1;
			isolation: isolate;
		}
		.notification-toast--warning {
			background: #fff8e8;
			border-color: #f5c76f;
		}
		.notification-toast--danger {
			background: #fff1f1;
			border-color: #ef9a9a;
		}
		.notification-toast--info {
			background: #eef7ff;
			border-color: #90caf9;
		}
		.birth-date-segment {
			min-width: 0;
			text-align: center;
			font-variant-numeric: tabular-nums;
		}
		.birth-date-picker {
			background: #ffffff;
			border: 1px solid #d6e2ef;
			box-shadow: 0 18px 44px rgba(13, 33, 55, 0.18);
			animation: birthDatePickerIn 0.16s ease-out;
		}
		.birth-date-options {
			scrollbar-width: thin;
			scrollbar-color: #90caf9 #eef7ff;
		}
		.birth-date-option[aria-selected="true"] {
			background: #1565c0;
			color: #ffffff;
		}
		@keyframes birthDatePickerIn {
			from { opacity: 0; transform: translateY(-6px) scale(0.985); }
			to { opacity: 1; transform: translateY(0) scale(1); }
		}
		.pulse-critical {
			animation: pulseDanger 1.2s ease-in-out infinite;
		}
		.skeleton {
			background: rgb(var(--panel-2));
		}

		/* UTEx-inspired MedPulse skin. Presentation-only overrides. */
		html:not(.dark) body {
			background: #ffffff;
			color: #455a64;
		}
		html:not(.dark) :where(h1, h2, h3, h4, h5, h6, .text-slate-900) {
			color: #1a3a5c !important;
		}

		/* Topbar */
		header.sticky {
			background: #0d2137 !important;
			border-bottom: 2px solid #1e88e5 !important;
			color: #ffffff !important;
		}
		header.sticky > div { min-height: 56px !important; }
		header.sticky :where(.text-slate-900, .text-slate-800, .text-slate-700, .text-slate-600, .text-slate-500, .dark\:text-white, .dark\:text-slate-300) {
			color: #ffffff !important;
		}
		header.sticky .text-slate-900,
		header.sticky .text-slate-800,
		header.sticky .text-slate-700,
		header.sticky .text-slate-600,
		header.sticky .text-slate-500 { color: #ffffff !important; }
		header.sticky button {
			background: rgba(255, 255, 255, 0.08) !important;
			border-color: rgba(255, 255, 255, 0.22) !important;
			color: #ffffff !important;
			border-radius: 6px !important;
		}
		header.sticky button:hover { background: rgba(255, 255, 255, 0.15) !important; }
		header:not(.sticky) {
			background: #0d2137 !important;
			border-color: rgba(255, 255, 255, 0.15) !important;
			border-bottom: 2px solid #1e88e5 !important;
			color: #ffffff !important;
		}
		header:not(.sticky) :where(.text-slate-900, .text-slate-700, .text-slate-600) { color: #ffffff !important; }
		.landing-screen {
			background:
				radial-gradient(circle at bottom left, #a9d6f8 0%, #c9e5fa 26%, rgba(225, 242, 255, 0.72) 44%, transparent 66%),
				linear-gradient(180deg, #ffffff 0%, #ffffff 28%, #f5faff 58%, #e7f4ff 100%);
		}
		header.landing-titlebar {
			min-height: 112px;
			background: rgba(255, 255, 255, 0.86) !important;
			border: 1px solid rgba(30, 136, 229, 0.26) !important;
			border-bottom: 3px solid #1e88e5 !important;
			border-radius: 14px !important;
			box-shadow: 0 8px 24px rgba(26, 58, 92, 0.1);
			backdrop-filter: blur(12px);
		}
		header.landing-titlebar .landing-system-title { color: #1a3a5c !important; }
		.landing-hero { position: relative; }
		.landing-eyebrow {
			display: inline-flex;
			align-items: center;
			gap: 0.5rem;
			border: 1px solid rgba(21, 101, 192, 0.18);
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.78);
			padding: 0.5rem 0.9rem;
			color: #1565c0;
			font-size: 0.78rem;
			font-weight: 700;
			letter-spacing: 0.02em;
			box-shadow: 0 4px 14px rgba(26, 58, 92, 0.06);
			backdrop-filter: blur(8px);
		}
		.landing-live-dot {
			width: 8px;
			height: 8px;
			border-radius: 999px;
			background: #2e7d32;
			box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.12);
			animation: livePulse 2s ease-in-out infinite;
		}
		.landing-hero-title {
			background: linear-gradient(110deg, #1a3a5c 10%, #1565c0 70%, #1e88e5 100%);
			-webkit-background-clip: text;
			background-clip: text;
			color: transparent !important;
		}
		.landing-hero-copy { color: #455a64; }
		.landing-cta {
			display: inline-flex;
			min-height: 48px;
			align-items: center;
			justify-content: center;
			gap: 0.7rem;
			border: 0;
			border-radius: 8px;
			background: linear-gradient(135deg, #1565c0, #1e88e5);
			padding: 0.8rem 1.5rem;
			color: #ffffff;
			font-weight: 700;
			box-shadow: 0 10px 24px rgba(21, 101, 192, 0.22);
			transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
		}
		.landing-cta:hover {
			transform: translateY(-2px);
			box-shadow: 0 14px 30px rgba(21, 101, 192, 0.28);
			filter: saturate(1.08);
		}
		.landing-feature-card {
			min-height: 176px;
			border: 1px solid rgba(21, 101, 192, 0.14);
			border-radius: 12px;
			background: rgba(255, 255, 255, 0.78);
			padding: 1.25rem;
			box-shadow: 0 6px 18px rgba(26, 58, 92, 0.07);
			backdrop-filter: blur(10px);
			transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
		}
		.landing-feature-card:hover {
			transform: translateY(-4px);
			border-color: rgba(30, 136, 229, 0.5);
			background: #ffffff;
			box-shadow: 0 12px 28px rgba(21, 101, 192, 0.14);
		}
		.landing-feature-icon {
			display: inline-flex;
			width: 46px;
			height: 46px;
			align-items: center;
			justify-content: center;
			border-radius: 10px;
		}
		.landing-feature-icon.blue { background: #e3f2fd; color: #1565c0; }
		.landing-feature-icon.orange { background: #fff3e0; color: #f57c00; }
		.landing-feature-icon.green { background: #e8f5e9; color: #2e7d32; }
		@keyframes livePulse {
			0%, 100% { opacity: 1; transform: scale(1); }
			50% { opacity: 0.65; transform: scale(0.86); }
		}

		/* Sidebar */
		aside {
			background: #1a3a5c !important;
			border-color: rgba(255, 255, 255, 0.12) !important;
			color: #ffffff !important;
		}
		aside > div:first-child {
			height: 56px !important;
			border-color: rgba(255, 255, 255, 0.12) !important;
		}
		aside :where(.text-slate-900, .text-slate-800, .text-slate-700, .text-slate-600, .text-slate-500, .text-slate-400) {
			color: #ffffff !important;
		}
		aside .text-slate-900,
		aside .text-slate-800,
		aside .text-slate-700,
		aside .text-slate-600,
		aside .text-slate-500,
		aside .text-slate-400 { color: #ffffff !important; }
		html:not(.dark) aside .text-slate-900,
		html:not(.dark) aside .text-slate-800,
		html:not(.dark) aside .text-slate-700,
		html:not(.dark) aside .text-slate-600,
		html:not(.dark) aside .text-slate-500,
		html:not(.dark) aside .text-slate-400 { color: #ffffff !important; }
		aside nav button {
			color: #ffffff !important;
			border-radius: 6px !important;
		}
		aside nav button:hover { background: rgba(255, 255, 255, 0.08) !important; }
		aside nav button[style*="box-shadow"] {
			background: rgba(255, 255, 255, 0.12) !important;
			color: #ffffff !important;
			box-shadow: inset 3px 0 0 #1e88e5 !important;
		}
		aside nav button[style*="box-shadow"] > span:first-child {
			background: #1e88e5 !important;
			color: #ffffff !important;
		}
		aside > div:last-child {
			border-color: rgba(255, 255, 255, 0.12) !important;
		}
		aside > div:last-child > div { background: rgba(255, 255, 255, 0.08) !important; }

		/* Cards and panel headers */
		.card, .ui-card {
			background: #ffffff;
			border: 1px solid #e3eaf2;
			border-radius: 8px !important;
			box-shadow: 0 2px 8px rgba(26, 58, 92, 0.08);
		}
		.card > .border-b:first-child {
			background: linear-gradient(135deg, #1565c0, #1e88e5) !important;
			border-color: transparent !important;
			color: #ffffff !important;
		}
		.card > .border-b:first-child :where(h1, h2, h3, p, div, span) { color: #ffffff !important; }
		.card > .border-b:first-child .ui-btn-secondary {
			background: rgba(255, 255, 255, 0.12) !important;
			border-color: rgba(255, 255, 255, 0.7) !important;
			color: #ffffff !important;
		}

		/* Buttons and controls */
		.ui-btn { border-radius: 6px !important; }
		.ui-btn-primary {
			background: #1565c0 !important;
			border-color: #1565c0 !important;
			color: #ffffff !important;
		}
		.ui-btn-primary:hover { background: #0d47a1 !important; border-color: #0d47a1 !important; }
		.ui-btn-secondary {
			background: #ffffff !important;
			border: 2px solid #1565c0 !important;
			color: #1565c0 !important;
		}
		.ui-btn-secondary:hover { background: #1565c0 !important; color: #ffffff !important; }
		html:not(.dark) :where(input, select, textarea) {
			background: #f0f4f8 !important;
			border-color: #e3eaf2 !important;
			border-radius: 6px !important;
			color: #1a3a5c !important;
		}

		/* Tables, charts and clinical states */
		.ui-table thead {
			background: linear-gradient(135deg, #1565c0, #1e88e5) !important;
			color: #ffffff !important;
		}
		.ui-table thead th { color: #ffffff !important; }
		.ui-table tbody tr:nth-child(even) { background: #f0f4f8; }
		.ui-table tbody tr:hover { background: #e8f3fc; }
		svg path[stroke="#2563eb"] { stroke: #1e88e5 !important; }
		svg path[fill="rgba(37,99,235,0.12)"] { fill: rgba(30, 136, 229, 0.12) !important; }
		html:not(.dark) :where(.text-emerald-600, .text-emerald-700, .text-emerald-800) { color: #2e7d32 !important; }
		html:not(.dark) :where(.text-amber-600, .text-amber-700, .text-amber-800) { color: #f57c00 !important; }
		html:not(.dark) :where(.text-red-600, .text-red-700, .text-red-800) { color: #d32f2f !important; }
		html:not(.dark) .bg-emerald-50 { background: rgba(46, 125, 50, 0.09) !important; }
		html:not(.dark) .bg-amber-50 { background: rgba(245, 124, 0, 0.09) !important; }
		html:not(.dark) .bg-red-50 { background: rgba(211, 47, 47, 0.09) !important; }

		/* Keep the clinical workspace readable even when an old dark-mode preference is stored. */
		html.dark body { background: #ffffff !important; color: #455a64 !important; }
		html.dark main { background: #ffffff !important; color: #455a64 !important; }
		html.dark main [class*="dark:bg-slate"] { background: #f0f4f8 !important; }
		html.dark main [class*="dark:text-slate"],
		html.dark main [class*="dark:text-white"] { color: #455a64 !important; }
		html.dark main :where(h1, h2, h3, h4, h5, h6, .text-slate-900, .text-slate-800) { color: #1a3a5c !important; }
		main .text-slate-700,
		main .text-slate-600,
		main .text-slate-500 { color: #455a64 !important; }
		main .text-slate-900,
		main .text-slate-800 { color: #1a3a5c !important; }
		html.dark :where(input, select, textarea) {
			background: #f0f4f8 !important;
			border-color: #e3eaf2 !important;
			color: #1a3a5c !important;
		}
		main :where(.text-emerald-600, .text-emerald-700, .text-emerald-800) { color: #2e7d32 !important; }
		main :where(.text-amber-600, .text-amber-700, .text-amber-800) { color: #f57c00 !important; }
		main :where(.text-red-600, .text-red-700, .text-red-800) { color: #d32f2f !important; }

		/* Clear light-blue hover feedback for every interactive data row. */
		aside nav button:hover { background: rgba(30, 136, 229, 0.28) !important; }
		.ui-table tbody tr:hover,
		.ui-table tbody tr:hover td { background: #e3f2fd !important; }
		main button[data-action="open-patient"]:hover,
		main .ui-btn-secondary:hover { background: #e3f2fd !important; color: #1565c0 !important; }
		.notification-toast,
		.notification-toast :where(div, span) {
			color: #12395f !important;
		}
		.notification-toast .toast-title,
		.notifications-panel .toast-title {
			color: #071c33 !important;
		}
		.notification-toast .toast-message,
		.notifications-panel .toast-message {
			color: #1f3f5f !important;
			opacity: 1 !important;
		}
		.notifications-panel,
		.notifications-panel :where(div, span) {
			color: #12395f !important;
		}
		.notifications-panel .toast-time {
			color: #365872 !important;
		}
		@media (prefers-reduced-motion: reduce) {
			*, *::before, *::after {
				scroll-behavior: auto !important;
				animation-duration: 0.01ms !important;
				animation-iteration-count: 1 !important;
				transition-duration: 0.01ms !important;
			}
		}
	</style>
</head>
<body class="text-slate-900 dark:text-slate-100">
	<div id="app"></div>

	<script src="https://unpkg.com/lucide@latest"></script>
	<script>
		const STORAGE_KEY = 'medpulse-dashboard-v1';
		const DEMO_LOGIN_USER = 'nurse.le';
		const DEMO_LOGIN_PASSWORD = 'demo123';
		const state = {
			authed: false,
			screen: 'landing',
			view: 'dashboard',
			sidebarOpen: true,
			notificationsOpen: false,
			profileOpen: false,
			settingsOpen: false,
			alertModal: null,
			toastQueue: [],
			alertHistory: {},
			pendingRegistrations: [],
			bleDevices: [],
			stations: [],
			deviceCommands: [],
			deviceTransports: {},
			commandActionPending: false,
			selectedBleDeviceId: '',
			deviceActionPending: false,
			patientDeletePending: false,
			patientDeleteModal: null,
			patientDeleteEmail: '',
			patientDeleteOtp: '',
			patientDeleteError: '',
			patientDeleteChallengeId: '',
			patientDeleteMaskedEmail: '',
			registrationPatientId: null,
			registrationName: '',
			registrationDateOfBirth: '',
			registrationBirthDay: '',
			registrationBirthMonth: '',
			registrationBirthYear: '',
			registrationDatePickerOpen: false,
			registrationAge: '',
			registrationGender: '',
			registrationRoom: '',
			registrationBed: '',
			registrationCondition: '',
			registrationSubmitting: false,
			registrationError: '',
			selectedPatientId: null,
			search: '',
			filter: 'all',
			sort: 'risk',
			page: 1,
			pageSize: 8,
			loading: true,
			realtime: true,
			kioskStatus: 'online',
			mqttStatus: 'connected',
			wifiStatus: 'stable',
			inputName: '',
			inputEmail: '',
			loginPin: '',
			loginPending: false,
			loginError: '',
			authToken: '',
			authUser: null,
			loginMode: 'staff',
			currentUserRole: 'HEAD_NURSE',
			historyRange: '7d',
			historyLoading: false,
			historyError: '',
			dateRange: '24h',
			floorFocus: 'north-wing',
			soundEnabled: true,
		};

		let patients = [];

		// Hàm tiện ích (dùng cho biểu đồ & UI, không còn sinh dữ liệu ảo)
		function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
		const ROLE_LEVELS = { STAFF_NURSE: 1, HEAD_NURSE: 2, MANAGER: 3, ADMIN: 3 };
		function canDeletePatients() {
			return (ROLE_LEVELS[state.currentUserRole] || 0) >= ROLE_LEVELS.HEAD_NURSE;
		}

		function formatTime(date) {
			return new Intl.DateTimeFormat('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }).format(date);
		}
		function formatDateTime(date) {
			return new Intl.DateTimeFormat('vi-VN', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }).format(date);
		}
		function formatRelative(minutesAgo) {
			if (minutesAgo < 1) return 'vừa xong';
			if (minutesAgo < 60) return `${Math.round(minutesAgo)} phút trước`;
			return `${Math.floor(minutesAgo / 60)} giờ trước`;
		}

		function formatDateTimeFull(date) {
			if (!date) return 'Chưa có dữ liệu';
			const value = date instanceof Date ? date : new Date(date);
			if (Number.isNaN(value.getTime())) return 'Chưa có dữ liệu';
			return new Intl.DateTimeFormat('vi-VN', {
				hour: '2-digit',
				minute: '2-digit',
				second: '2-digit',
				day: '2-digit',
				month: '2-digit',
				year: 'numeric',
			}).format(value);
		}
		function formatMillisecondsAge(value) {
			if (!Number.isFinite(value)) return 'chưa có';
			if (value < 1000) return 'vừa xong';
			if (value < 60000) return `${Math.round(value / 1000)} giây`;
			if (value < 3600000) return `${Math.round(value / 60000)} phút`;
			return `${Math.round(value / 3600000)} giờ`;
		}
		function hasMeasurementData(patient) {
			return patient?.hasRealData === true || Boolean(patient?.lastMeasurementAt);
		}
		function latestMeasurementDate(patient) {
			if (!hasMeasurementData(patient)) return null;
			return patient.lastMeasurementAt ? new Date(patient.lastMeasurementAt) : patient.lastUpdate;
		}
		function vitalText(patient, key, suffix = '') {
			if (!hasMeasurementData(patient)) return 'Chưa có dữ liệu';
			const value = patient?.[key];
			return value === null || value === undefined || value === '' ? 'Chưa có dữ liệu' : `${value}${suffix}`;
		}

		function patientConnectionText(patient) {
			if (patient?.signalLost) return 'Không có gói tin mới';
			if ((patient?.battery ?? 100) < 20) return 'Pin thiết bị yếu';
			if (patient?.measurementSource === 'DIRECT_MQTT') return 'Đang nhận MQTT trực tiếp';
			if (patient?.measurementSource === 'BLE_GATEWAY') return 'Đang nhận BLE qua trạm';
			return 'Đang nhận dữ liệu';
		}

		function enqueueAlert(patient, type, options = {}) {
			const { showModal = true, cooldownMs = 0 } = options;
			const now = Date.now();
			const lastAlertAt = state.alertHistory[patient.id] || 0;
			if (cooldownMs && now - lastAlertAt < cooldownMs) {
				return;
			}
			state.alertHistory = {
				...state.alertHistory,
				[patient.id]: now,
			};
			const alert = {
				id: `${now}-${Math.random().toString(16).slice(2)}`,
				type,
				patient,
				time: new Date(),
				kiosk: patient.kiosk,
			};
			if (showModal && (!state.alertModal || state.alertModal.patient.id !== patient.id)) {
				state.alertModal = alert;
			}
			state.toastQueue.unshift({
				id: alert.id,
				title: type === 'critical' ? 'Cảnh báo khẩn cấp' : 'Cập nhật trạng thái',
				message: `${patient.name} tại ${patient.kiosk}`,
				tone: type === 'critical' ? 'danger' : 'info',
			});
			state.toastQueue = state.toastQueue.slice(0, 3);
			playAlarmTone();
			render();
			setTimeout(() => {
				if (state.alertModal && state.alertModal.id === alert.id) state.alertModal = null;
				render();
			}, 5200);
		}

		function playAlarmTone() {
			if (!state.soundEnabled) return;
			try {
				const AudioContextClass = window.AudioContext || window.webkitAudioContext;
				if (!AudioContextClass) return;
				const context = new AudioContextClass();
				const oscillator = context.createOscillator();
				const gain = context.createGain();
				oscillator.type = 'sine';
				oscillator.frequency.setValueAtTime(880, context.currentTime);
				oscillator.frequency.exponentialRampToValueAtTime(520, context.currentTime + 0.18);
				gain.gain.setValueAtTime(0.0001, context.currentTime);
				gain.gain.exponentialRampToValueAtTime(0.08, context.currentTime + 0.05);
				gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.5);
				oscillator.connect(gain);
				gain.connect(context.destination);
				oscillator.start();
				oscillator.stop(context.currentTime + 0.52);
			} catch (error) {
			}
		}

		function playAlertTone() {
			playAlarmTone();
		}

		function getVisiblePatients() {
			let items = [...patients];
			if (state.search.trim()) {
				const keyword = state.search.trim().toLowerCase();
				items = items.filter((patient) =>
					[patient.name, patient.id, patient.room, patient.kiosk].join(' ').toLowerCase().includes(keyword)
				);
			}
			if (state.filter !== 'all') {
				items = items.filter((patient) => patient.status === state.filter);
			}
			if (state.sort === 'name') {
				items.sort((left, right) => left.name.localeCompare(right.name, 'vi'));
			} else if (state.sort === 'heartRate') {
				items.sort((left, right) => right.heartRate - left.heartRate);
			} else if (state.sort === 'risk') {
				items.sort((left, right) => right.riskScore - left.riskScore);
			} else if (state.sort === 'updated') {
				items.sort((left, right) => right.lastUpdate - left.lastUpdate);
			}
			return items;
		}

		function currentPatient() {
			return patients.find((patient) => patient.id === state.selectedPatientId) || patients[0];
		}

		const BLE_DEVICE_STATUSES = new Set(['OFFLINE', 'ONLINE', 'GRACE', 'ALERT', 'STATION_OFFLINE']);
		const STATION_HEARTBEAT_STALE_MS = 90000;
		const COMMAND_TERMINAL_DISPLAY_MS = 90000;

		function normalizeBleDeviceState(raw) {
			if (!raw || typeof raw.deviceId !== 'string' || !/^[A-Za-z0-9_-]{1,24}$/.test(raw.deviceId)) return null;
			const status = BLE_DEVICE_STATUSES.has(raw.status) ? raw.status : 'OFFLINE';
			return {
				deviceId: raw.deviceId,
				patientId: raw.patientId || null,
				patientName: raw.patientName || null,
				stationId: raw.stationId || null,
				status,
				sessionActive: raw.sessionActive === true,
				sessionBlocked: raw.sessionBlocked === true,
				seenToday: raw.seenToday === true,
				firstSeenToday: raw.firstSeenToday || null,
				lastBleSeen: raw.lastBleSeen || null,
				disconnectedAt: raw.disconnectedAt || null,
				alertStartedAt: raw.alertStartedAt || null,
				rssi: Number.isFinite(raw.rssi) ? raw.rssi : null,
				battery: Number.isFinite(raw.battery) ? raw.battery : null,
				lastGattEventSequence: Number.isInteger(raw.lastGattEventSequence) ? raw.lastGattEventSequence : null,
				lastGattEventUptimeSeconds: Number.isInteger(raw.lastGattEventUptimeSeconds) ? raw.lastGattEventUptimeSeconds : null,
				lastGattEventAt: raw.lastGattEventAt || null,
				gattReady: raw.gattReady === true,
				lastGattStatusAt: raw.lastGattStatusAt || null,
				bleGatewayReady: raw.bleGatewayReady === true,
				gattStatusAgeMs: Number.isFinite(raw.gattStatusAgeMs) ? raw.gattStatusAgeMs : null,
				stationStatus: raw.stationStatus || null,
				sensorReady: typeof raw.sensorReady === 'boolean' ? raw.sensorReady : null,
				activeTransport: ['BLE_GATEWAY', 'DIRECT_MQTT'].includes(raw.activeTransport) ? raw.activeTransport : 'OFFLINE',
				transportOnline: raw.transportOnline === true,
				lastEvent: raw.lastEvent || null,
				connectionAlert: raw.connectionAlert === true || raw.lastEvent === 'BLE_ALERT_TIMEOUT',
				medicalFallAlert: raw.medicalFallAlert === true || raw.lastEvent?.endsWith('FALL_ALERT'),
				lastUpdated: raw.lastUpdated || null,
			};
		}

		function upsertBleDevice(raw) {
			const device = normalizeBleDeviceState(raw);
			if (!device) return null;
			const index = state.bleDevices.findIndex(item => item.deviceId === device.deviceId);
			if (index === -1) state.bleDevices.push(device);
			else state.bleDevices[index] = device;
			return device;
		}

		function isWearableFallAlert(device) {
			return device?.medicalFallAlert === true || device?.lastEvent?.endsWith('FALL_ALERT');
		}

		function isWearablePreAlert(device) {
			return device?.lastEvent?.endsWith('PREALERT');
		}

		function normalizeStationState(raw) {
			if (!raw || typeof raw.stationId !== 'string' || !/^[A-Za-z0-9_-]{1,50}$/.test(raw.stationId)) return null;
			const lastSeenAt = raw.lastSeenAt || null;
			const lastSeenMs = lastSeenAt ? new Date(lastSeenAt).getTime() : 0;
			const heartbeatFresh = raw.status === 'ONLINE' && lastSeenMs > 0 && Date.now() - lastSeenMs < STATION_HEARTBEAT_STALE_MS;
			return {
				stationId: raw.stationId,
				status: heartbeatFresh ? 'ONLINE' : 'OFFLINE',
				lastSeenAt,
				wifiRssi: Number.isFinite(raw.wifiRssi) ? raw.wifiRssi : null,
				freeHeap: Number.isFinite(raw.freeHeap) ? raw.freeHeap : null,
				trackedBleDevices: Number.isInteger(raw.trackedBleDevices) ? raw.trackedBleDevices : 0,
				gattReadyConnections: Number.isInteger(raw.gattReadyConnections) ? raw.gattReadyConnections : 0,
				malformedGattFrames: Number.isInteger(raw.malformedGattFrames) ? raw.malformedGattFrames : 0,
				droppedGattFrames: Number.isInteger(raw.droppedGattFrames) ? raw.droppedGattFrames : 0,
				max30102Ready: raw.max30102Ready,
				mlx90614Ready: raw.mlx90614Ready,
				rc522Ready: raw.rc522Ready,
				bleScanner: raw.bleScanner === true,
				uptimeMs: Number.isFinite(raw.uptimeMs) ? raw.uptimeMs : null,
				lastUpdated: raw.lastUpdated || null,
			};
		}

		function upsertStation(raw) {
			const station = normalizeStationState(raw);
			if (!station) return null;
			const index = state.stations.findIndex(item => item.stationId === station.stationId);
			if (index === -1) state.stations.push(station);
			else state.stations[index] = station;
			return station;
		}

		function isStationOnline(station) {
			if (station?.status !== 'ONLINE' || !station.lastSeenAt) return false;
			const lastSeenMs = new Date(station.lastSeenAt).getTime();
			return Number.isFinite(lastSeenMs) && Date.now() - lastSeenMs < STATION_HEARTBEAT_STALE_MS;
		}

		function refreshStationFreshness() {
			let changed = false;
			state.stations = state.stations.map(station => {
				if (station.status === 'ONLINE' && !isStationOnline(station)) {
					changed = true;
					return { ...station, status: 'OFFLINE' };
				}
				return station;
			});
			return changed;
		}

		function deviceForPatient(patientId) {
			return state.bleDevices.find(device => device.patientId === patientId) || null;
		}

		function hasBleConnectionAlert(device) {
			return device?.connectionAlert === true || device?.lastEvent === 'BLE_ALERT_TIMEOUT';
		}

		function isBleDeviceOffline(device) {
			if (!device) return true;
			return device.activeTransport === 'OFFLINE'
				|| device.status === 'OFFLINE'
				|| device.status === 'STATION_OFFLINE'
				|| device.status === 'GRACE'
				|| hasBleConnectionAlert(device);
		}

		function bleStatusMeta(device) {
			if (!device) return { label: 'Chưa liên kết', tone: 'slate', detail: 'Chưa gán thiết bị đeo' };
			if (hasBleConnectionAlert(device)) {
				return { label: 'Mất BLE', tone: 'danger', detail: 'Quá 180 giây chưa nhận lại BLE từ thiết bị đeo' };
			}
			if (device.activeTransport === 'DIRECT_MQTT') {
				return { label: 'MQTT trực tiếp', tone: 'safe', detail: 'Thiết bị đeo đang gửi trực tiếp lên cloud, không đi qua trạm BLE' };
			}
			if (device.activeTransport === 'BLE_GATEWAY') {
				return { label: 'BLE online', tone: 'safe', detail: device.stationId ? `Trạm ${device.stationId} đang nhận kết nối BLE/GATT từ thiết bị đeo` : 'Trạm đang nhận kết nối BLE/GATT từ thiết bị đeo' };
			}
			const states = {
				ONLINE: { label: 'Online', tone: 'safe', detail: 'Kênh thiết bị đang hoạt động' },
				GRACE: { label: 'Chờ kết nối lại', tone: 'warning', detail: 'Đang trong thời gian chờ 180 giây' },
				ALERT: { label: 'Offline', tone: 'slate', detail: 'Không có kênh kết nối; cảnh báo té ngã hiển thị ở trạng thái bệnh nhân' },
				STATION_OFFLINE: { label: 'Trạm offline', tone: 'warning', detail: 'Không thể xác định trạng thái thiết bị đeo' },
				OFFLINE: { label: 'Offline', tone: 'slate', detail: device.seenToday ? 'Phiên theo dõi đã kết thúc' : 'Chưa khởi động trong ngày' },
			};
			return states[device.status] || states.OFFLINE;
		}

		function bleBadge(device) {
			const meta = bleStatusMeta(device);
			const classes = meta.tone === 'safe' ? 'ui-badge-safe' : meta.tone === 'danger' ? 'ui-badge-danger' : meta.tone === 'warning' ? 'ui-badge-warning' : 'bg-slate-100 text-slate-700';
			return `<span class="ui-badge ${classes}"><i data-lucide="${meta.tone === 'safe' ? 'bluetooth-connected' : meta.tone === 'danger' ? 'bluetooth-off' : 'bluetooth'}" class="h-4 w-4"></i>${meta.label}</span>`;
		}

		function openPatientRegistration(patientId) {
			const pending = state.pendingRegistrations.find(item => item.id === patientId);
			if (!pending) {
				showToast('RFID không còn chờ', 'Gói tin này đã được xử lý hoặc backend đã khởi động lại.', 'warning');
				return;
			}
			if (state.registrationPatientId !== patientId) {
				state.registrationName = '';
				state.registrationDateOfBirth = '';
				state.registrationBirthDay = '';
				state.registrationBirthMonth = '';
				state.registrationBirthYear = '';
				state.registrationDatePickerOpen = false;
				state.registrationAge = '';
				state.registrationGender = '';
				state.registrationRoom = '';
				state.registrationBed = '';
				state.registrationCondition = '';
			}
			state.registrationPatientId = patientId;
			state.registrationError = '';
			state.notificationsOpen = false;
			state.profileOpen = false;
			state.view = 'register';
			render();
		}

		function calculateAgeFromBirthDate(year, month, day) {
			const today = new Date();
			let age = today.getFullYear() - year;
			if (today.getMonth() + 1 < month || (today.getMonth() + 1 === month && today.getDate() < day)) age--;
			return age >= 0 && age <= 130 ? age : null;
		}

		function getDaysInMonth(year, month) {
			if (!Number.isInteger(year) || !Number.isInteger(month) || month < 1 || month > 12) return 0;
			return new Date(year, month, 0).getDate();
		}

		function syncRegistrationBirthDate() {
			const day = Number(state.registrationBirthDay);
			const month = Number(state.registrationBirthMonth);
			const year = Number(state.registrationBirthYear);
			const candidate = new Date(year, month - 1, day);
			const valid = /^\d{1,2}$/.test(state.registrationBirthDay)
				&& /^\d{1,2}$/.test(state.registrationBirthMonth)
				&& /^\d{4}$/.test(state.registrationBirthYear)
				&& candidate.getFullYear() === year
				&& candidate.getMonth() === month - 1
				&& candidate.getDate() === day
				&& candidate <= new Date();
			if (!valid) {
				state.registrationDateOfBirth = '';
				if (state.registrationBirthDay || state.registrationBirthMonth || state.registrationBirthYear) state.registrationAge = '';
				return null;
			}
			state.registrationDateOfBirth = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
			state.registrationAge = String(calculateAgeFromBirthDate(year, month, day));
			return Number(state.registrationAge);
		}

		function validatePatientRegistrationForm() {
			const name = String(state.registrationName || '').trim();
			if (name.length < 2 || name.length > 100) return 'Họ và tên phải có từ 2 đến 100 ký tự.';

			const hasAnyBirthPart = Boolean(state.registrationBirthDay || state.registrationBirthMonth || state.registrationBirthYear);
			if (hasAnyBirthPart && !state.registrationDateOfBirth) {
				const day = Number(state.registrationBirthDay);
				const month = Number(state.registrationBirthMonth);
				const year = Number(state.registrationBirthYear);
				if (!Number.isInteger(day) || day < 1 || day > 31) return 'Ngày sinh phải là số từ 1 đến 31.';
				if (!Number.isInteger(month) || month < 1 || month > 12) return 'Tháng sinh phải là số từ 1 đến 12.';
				if (!/^\d{4}$/.test(state.registrationBirthYear)) return 'Năm sinh phải gồm đủ 4 chữ số.';
				if (year > new Date().getFullYear() || year < new Date().getFullYear() - 130) return 'Năm sinh không nằm trong phạm vi hợp lệ.';
				const maximumDay = getDaysInMonth(year, month);
				if (day > maximumDay) return `Tháng ${month} năm ${year} chỉ có ${maximumDay} ngày.`;
				return 'Ngày sinh không tồn tại hoặc nằm sau ngày hiện tại.';
			}

			if (!state.registrationDateOfBirth) {
				if (String(state.registrationAge).trim() === '') return 'Cần nhập ngày sinh hoặc tuổi bệnh nhân.';
				const age = Number(state.registrationAge);
				if (!Number.isInteger(age) || age < 0 || age > 130) return 'Tuổi phải là số nguyên từ 0 đến 130.';
			}
			return '';
		}

		function upsertPendingRegistration(entry, notify = false) {
			if (!entry?.id) return;
			const index = state.pendingRegistrations.findIndex(item => item.id === entry.id);
			if (index === -1) state.pendingRegistrations.unshift(entry);
			else state.pendingRegistrations[index] = entry;

			if (notify && !state.toastQueue.some(toast => toast.patientId === entry.id && toast.action === 'open-registration')) {
				state.toastQueue.unshift({
					id: `unknown-${entry.id}-${Date.now()}`,
					title: 'Phát hiện RFID chưa đăng ký',
					message: `${entry.id} đang chờ nhập thông tin bệnh nhân.`,
					tone: 'warning',
					action: 'open-registration',
					patientId: entry.id,
					time: new Date(),
				});
				state.toastQueue = state.toastQueue.slice(0, 5);
			}
		}

		async function submitPatientRegistration() {
			if (!state.registrationPatientId || state.registrationSubmitting) return;
			const validationError = validatePatientRegistrationForm();
			if (validationError) {
				state.registrationError = validationError;
				showToast('Không thể lưu hồ sơ', validationError, 'warning');
				return;
			}
			state.registrationSubmitting = true;
			state.registrationError = '';
			render();
			const registrationController = new AbortController();
			const registrationTimeout = setTimeout(() => registrationController.abort(), 20000);

			try {
				const response = await apiFetch(`${BACKEND_BASE_URL}/api/patients/${encodeURIComponent(state.registrationPatientId)}/register`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					signal: registrationController.signal,
					body: JSON.stringify({
						name: state.registrationName,
						dateOfBirth: state.registrationDateOfBirth || null,
						age: state.registrationAge === '' ? null : Number(state.registrationAge),
						gender: state.registrationGender || null,
						room: state.registrationRoom || null,
						bed: state.registrationBed || null,
						conditionSummary: state.registrationCondition || null,
					}),
				});
				const payload = await response.json();
				if (!response.ok) throw new Error(payload.error || 'Không thể đăng ký bệnh nhân');

				const remote = payload.patient;
				const patientName = remote.name || remote.id;
				const mapped = {
					...remote,
					avatar: patientName.split(' ').slice(-2).map(part => part[0]).join('').toUpperCase() || 'P',
					name: patientName,
					room: remote.room || '---',
					lastUpdate: new Date(remote.lastUpdate || Date.now()),
					history: remote.hasRealData
						? { heartRate: [remote.heartRate], spo2: [remote.spo2], temp: [remote.temp] }
						: { heartRate: [], spo2: [], temp: [] },
					checkins: remote.hasRealData ? [{ type: 'Check-in', time: new Date(remote.lastMeasurementAt), place: remote.room || '---' }] : [],
					timeline: [{ label: 'Đăng ký hồ sơ', time: new Date(), note: 'RFID đã được liên kết với bệnh nhân' }],
				};
				const index = patients.findIndex(patient => patient.id === remote.id);
				if (index === -1) patients.push(mapped); else Object.assign(patients[index], mapped);

				state.pendingRegistrations = state.pendingRegistrations.filter(item => item.id !== remote.id);
				state.toastQueue = state.toastQueue.filter(toast => toast.patientId !== remote.id);
				state.selectedPatientId = remote.id;
				state.registrationPatientId = null;
				state.registrationSubmitting = false;
				state.view = 'detail';
				showToast('Đăng ký thành công', `${patientName} đã được thêm vào hệ thống.`, 'info');
			} catch (error) {
				const message = error.name === 'AbortError'
					? 'Backend hoặc database phản hồi quá chậm. Vui lòng thử lưu lại.'
					: error.message;
				state.registrationSubmitting = false;
				state.registrationError = message;
				showToast('Không thể lưu hồ sơ', message, 'danger');
			} finally {
				clearTimeout(registrationTimeout);
			}
		}

		async function loadSelectedPatientHistory() {
			const patient = currentPatient();
			if (!patient) return;
			const patientId = patient.id;
			const requestedRange = state.historyRange;
			state.historyLoading = true;
			state.historyError = '';
			render();

			try {
				const response = await fetch(`${BACKEND_BASE_URL}/api/patients/${encodeURIComponent(patientId)}/history?range=${encodeURIComponent(requestedRange)}&limit=1000`);
				const payload = await response.json();
				if (!response.ok) throw new Error(payload.error || 'Không thể tải lịch sử bệnh nhân');
				if (!Array.isArray(payload)) throw new Error('Dữ liệu lịch sử không đúng định dạng');

				const target = patients.find(item => item.id === patientId);
				if (target) {
					const numericSeries = (key) => payload.map(row => Number(row[key])).filter(Number.isFinite);
					target.history = {
						heartRate: numericSeries('heartRate'),
						spo2: numericSeries('spo2'),
						temp: numericSeries('temp'),
					};
					target.historyRecords = payload;
					target.statusHistory = payload.map(row => ({
						status: row.current_status || row.status || 'IDLE',
						at: row.time,
					}));
				}
				if (state.selectedPatientId === patientId && state.historyRange === requestedRange) {
					state.historyLoading = false;
					render();
				}
			} catch (error) {
				if (state.selectedPatientId === patientId && state.historyRange === requestedRange) {
					state.historyLoading = false;
					state.historyError = error.message;
					showToast('Không thể tải biểu đồ', error.message, 'danger');
				}
			}
		}

		async function fetchBleInfrastructure() {
			const [devicesResponse, stationsResponse] = await Promise.all([
				fetch(`${BACKEND_BASE_URL}/api/ble/devices`),
				fetch(`${BACKEND_BASE_URL}/api/stations`),
			]);
			if (!devicesResponse.ok) throw new Error('Không thể tải danh sách thiết bị BLE');
			if (!stationsResponse.ok) throw new Error('Không thể tải trạng thái trạm');
			const [devices, stations] = await Promise.all([devicesResponse.json(), stationsResponse.json()]);
			state.bleDevices = [];
			state.stations = [];
			(devices || []).forEach(upsertBleDevice);
			(stations || []).forEach(upsertStation);
		}

		async function linkSelectedBleDevice() {
			const patient = currentPatient();
			const deviceId = state.selectedBleDeviceId;
			if (!patient || !deviceId || state.deviceActionPending) return;
			state.deviceActionPending = true;
			render();
			try {
				const response = await apiFetch(`${BACKEND_BASE_URL}/api/patients/${encodeURIComponent(patient.id)}/device`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ deviceId }),
				});

		async function runBleDeviceAction(action) {
			const patient = currentPatient();
			const device = patient ? deviceForPatient(patient.id) : null;
			if (!patient || !device || state.deviceActionPending) return;
			state.deviceActionPending = true;
			render();
			try {
				let url;
				let method = 'POST';
				if (action === 'start') url = `${BACKEND_BASE_URL}/api/ble/devices/${encodeURIComponent(device.deviceId)}/start-session`;
				else if (action === 'end') url = `${BACKEND_BASE_URL}/api/ble/devices/${encodeURIComponent(device.deviceId)}/end-session`;
				else {
					url = `${BACKEND_BASE_URL}/api/patients/${encodeURIComponent(patient.id)}/device`;
					method = 'DELETE';
				}
				const response = await apiFetch(url, { method });
				const payload = await response.json();
				if (!response.ok) throw new Error(payload.error || 'Không thể cập nhật thiết bị');
				upsertBleDevice(payload.device);
				state.deviceActionPending = false;
				const title = action === 'start' ? 'Đã bắt đầu phiên' : action === 'end' ? 'Đã kết thúc phiên' : 'Đã gỡ thiết bị';
				showToast(title, payload.message || 'Trạng thái thiết bị đã được cập nhật.', 'info');
			} catch (error) {
				state.deviceActionPending = false;
				showToast('Không thể cập nhật thiết bị', error.message, 'danger');
			}
		}

		async function sendWearableCommand(action) {
			const patient = currentPatient();
			const device = patient ? deviceForPatient(patient.id) : null;
			if (!device || state.commandActionPending) return;
			state.commandActionPending = true;
			render();
			try {
				const response = await apiFetch(`${BACKEND_BASE_URL}/api/devices/${encodeURIComponent(device.deviceId)}/commands`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ action, durationMs: action === 'BUZZER_OFF' ? 0 : 10000 }),
				});
				const responseText = await response.text();
				let payload = {};
				try {
					payload = responseText ? JSON.parse(responseText) : {};
				} catch (parseError) {
					const preview = responseText.replace(/\s+/g, ' ').slice(0, 180);
					throw new Error(preview || `Backend trả phản hồi không phải JSON (${response.status})`);
				}
				if (!response.ok) throw new Error(payload.details ? `${payload.error || 'Không thể gửi lệnh'}: ${payload.details}` : (payload.error || 'Không thể gửi lệnh'));
				upsertDeviceCommand(payload.command);
				showToast('Lệnh thiết bị đã được tạo', payload.command.route === 'PENDING'
					? (payload.command.error || 'Thiết bị chưa có transport; backend đang giữ lệnh chờ.')
					: `Đang gửi qua ${payload.command.route}.`, 'info');
			} catch (error) {
				showToast('Không thể gửi lệnh', error.message, 'danger');
			}
			state.commandActionPending = false;
			render();
		}

		function upsertDeviceCommand(raw) {
			if (!raw?.commandId) return null;
			const command = { ...raw };
			const index = state.deviceCommands.findIndex(item => item.commandId === command.commandId);
			if (index === -1) state.deviceCommands.unshift(command);
			else state.deviceCommands[index] = command;
			state.deviceCommands = state.deviceCommands.slice(0, 100);
			return command;
		}

		function commandStatusLabel(status) {
			return ({ PENDING: 'Đang chờ thiết bị', DISPATCHED: 'Đã gửi', DELIVERED: 'Đã nhận', EXECUTED: 'Đã thực thi', FAILED: 'Thất bại', EXPIRED: 'Hết hạn' })[status] || status;
		}

		function commandDiagnosticText(command) {
			if (!command) return '';
			const parts = [command.commandId, `route=${command.route}`, `status=${command.status}`];
			if (command.error) parts.push(`error=${command.error}`);
			if (command.dispatchedAt) parts.push(`sent=${formatDateTimeFull(command.dispatchedAt)}`);
			if (command.acknowledgedAt) parts.push(`ack=${formatDateTimeFull(command.acknowledgedAt)}`);
			if (command.expiresAt) parts.push(`expires=${formatDateTimeFull(command.expiresAt)}`);
			return parts.join(' · ');
		}

		function isVisibleCommandInControlPanel(command) {
			if (!command) return false;
			if (!['EXECUTED', 'FAILED', 'EXPIRED'].includes(command.status)) return true;
			const lastChangeMs = Date.parse(command.acknowledgedAt || command.expiresAt || command.dispatchedAt || command.createdAt || '');
			return Number.isFinite(lastChangeMs) && Date.now() - lastChangeMs < COMMAND_TERMINAL_DISPLAY_MS;
		}

		function openPatientDeleteModal() {
			const patient = currentPatient();
			if (!patient || state.patientDeletePending) return;
			if (!canDeletePatients()) {
				showToast('Không đủ quyền', 'Chỉ Y tá trưởng hoặc Quản trị viên được xóa bệnh nhân.', 'danger');
				return;
			}
			state.patientDeleteModal = { patientId: patient.id, patientName: patient.name, step: 'confirm' };
			state.patientDeleteEmail = '';
			state.patientDeleteOtp = '';
			state.patientDeleteError = '';
			state.patientDeleteChallengeId = '';
			state.patientDeleteMaskedEmail = '';
			render();
		}

		function closePatientDeleteModal() {
			if (state.patientDeletePending) return;
			state.patientDeleteModal = null;
			state.patientDeleteError = '';
			render();
		}

		async function requestPatientDeleteOtp() {
			const modal = state.patientDeleteModal;
			if (!modal || modal.step !== 'confirm' || state.patientDeletePending) return;

			state.patientDeletePending = true;
			state.patientDeleteError = '';
			render();
			const controller = new AbortController();
			const requestTimeout = setTimeout(() => controller.abort(), 20000);
			try {
				const otpResponse = await apiFetch(`${BACKEND_BASE_URL}/api/patients/${encodeURIComponent(modal.patientId)}/delete-otp`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({}),
					signal: controller.signal,
				});
				const otpPayload = await otpResponse.json();
				if (!otpResponse.ok) throw new Error(otpPayload.error || 'Không thể gửi mã xác nhận');
				state.patientDeleteModal = { ...modal, step: 'otp' };
				state.patientDeleteOtp = '';
				state.patientDeleteChallengeId = otpPayload.challengeId || '';
				state.patientDeleteMaskedEmail = otpPayload.maskedEmail || 'email quản lý';
			} catch (error) {
				state.patientDeleteError = error.name === 'AbortError'
					? 'Gửi email quá 20 giây không có phản hồi. Hãy kiểm tra SMTP_APP_PASSWORD và Render Logs.'
					: error.message;
			} finally {
				clearTimeout(requestTimeout);
			}
			state.patientDeletePending = false;
			render();
		}

		async function confirmPatientDeletion() {
			const modal = state.patientDeleteModal;
			const otp = state.patientDeleteOtp.trim().toUpperCase();
			if (!modal || modal.step !== 'otp' || state.patientDeletePending) return;
			if (!/^[A-Z2-9]{5}$/.test(otp)) {
				state.patientDeleteError = 'Mã xác nhận phải có đúng 5 ký tự.';
				render();
				return;
			}
			state.patientDeletePending = true;
			state.patientDeleteError = '';
			render();
			try {
				const response = await apiFetch(`${BACKEND_BASE_URL}/api/patients/${encodeURIComponent(modal.patientId)}`, {
					method: 'DELETE',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ challengeId: state.patientDeleteChallengeId, otp }),
				});
				const payload = await response.json();
				if (!response.ok) throw new Error(payload.error || 'Không thể xóa bệnh nhân');
				patients = patients.filter(item => item.id !== modal.patientId);
				state.bleDevices = state.bleDevices.map(device => device.patientId === modal.patientId
					? { ...device, patientId: null, patientName: null, sessionActive: false, sessionBlocked: false, status: 'OFFLINE' }
					: device);
				state.selectedPatientId = patients[0]?.id || null;
				state.patientDeletePending = false;
				state.patientDeleteModal = null;
				state.view = 'patients';
				showToast('Đã xóa bệnh nhân', payload.message || `Đã xóa ${modal.patientName}.`, 'info');
			} catch (error) {
				state.patientDeletePending = false;
				state.patientDeleteError = error.message;
			}
			render();
		}

		function linePath(series, width, height, padding = 16) {
			const min = Math.min(...series);
			const max = Math.max(...series);
			const isFlat = max === min;
			const span = max - min || 1;
			const innerWidth = width - padding * 2;
			const innerHeight = height - padding * 2;
			return series.map((value, index) => {
				const x = padding + (index / (series.length - 1)) * innerWidth;
				const y = isFlat ? height / 2 : padding + (1 - (value - min) / span) * innerHeight;
				return [Number(x.toFixed(1)), Number(y.toFixed(1))];
			});
		}

		function chartCard(title, series, unit, accent, extra = '') {
			const isEmpty = !series || series.length === 0;
			const validSeries = isEmpty ? [0, 0] : series.length === 1 ? [series[0], series[0]] : series;
			const width = 760;
			const height = 240;
			const points = linePath(validSeries, width, height, 24);
			const path = points.map((point, index) => `${index === 0 ? 'M' : 'L'} ${point[0]} ${point[1]}`).join(' ');
			const fill = `${path} L ${width - 24} ${height - 24} L 24 ${height - 24} Z`;
			const min = Math.min(...validSeries);
			const max = Math.max(...validSeries);
			const chartColor = accent.includes('emerald') ? '#16a34a' : accent.includes('red') ? '#dc2626' : accent.includes('amber') ? '#d97706' : '#2563eb';
			const chartFill = accent.includes('emerald') ? 'rgba(22,163,74,0.14)' : accent.includes('red') ? 'rgba(220,38,38,0.14)' : accent.includes('amber') ? 'rgba(217,119,6,0.14)' : 'rgba(37,99,235,0.12)';

			return `
				<div class="card p-5 md:p-6">
					<div class="mb-4 flex items-start justify-between gap-4">
						<div>
							<div class="text-sm font-semibold text-slate-600 dark:text-slate-300">${title}</div>
							<div class="mt-1 text-2xl font-bold tracking-tight text-slate-900 dark:text-white">${isEmpty ? '---' : validSeries[validSeries.length - 1]}<span class="ml-1 text-sm font-semibold text-slate-600 dark:text-slate-300">${unit}</span></div>
						</div>
						<div class="text-right">
							<div class="text-xs font-semibold text-slate-600 dark:text-slate-300">Độ biến thiên</div>
							<div class="mt-1 text-sm font-semibold ${accent}">${isEmpty ? 'Chờ dữ liệu...' : `${min} - ${max} ${unit}`}</div>
						</div>
					</div>
					<svg viewBox="0 0 ${width} ${height}" class="flex h-56 w-full items-center justify-center overflow-hidden rounded-[16px] bg-slate-50 dark:bg-slate-900">
						<g opacity="0.52">
							${Array.from({ length: 5 }).map((_, index) => `<line x1="24" y1="${24 + index * 42}" x2="736" y2="${24 + index * 42}" stroke="rgba(148,163,184,0.12)" />`).join('')}
						</g>
						${isEmpty ?
							`<text x="380" y="120" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="rgba(100, 116, 139, 0.8)">Chờ dữ liệu từ sensor...</text>` :
							`<path d="${fill}" fill="${chartFill}" />
							<path d="${path}" fill="none" stroke="${chartColor}" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
							${points.map((point) => `<circle cx="${point[0]}" cy="${point[1]}" r="4.5" fill="#fff" stroke="${chartColor}" stroke-width="3" />`).join('')}`
						}
					</svg>
				</div>
			`;
		}

		function progressBar(value, max, tone = 'brand') {
			const pct = Math.round((value / max) * 100);
			const toneClass = tone === 'danger'
				? 'bg-red-600'
				: tone === 'warning'
					? 'bg-amber-600'
					: tone === 'safe'
						? 'bg-emerald-600'
						: 'bg-brand-600';
			return `
				<div class="h-2.5 w-full rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
					<div class="h-full rounded-full ${toneClass}" style="width:${pct}%"></div>
				</div>
			`;
		}

		function normalizeFirmwareStatus(value) {
			const status = String(value || '').trim().toUpperCase();
			return ['IDLE', 'FALLING', 'IMPACT', 'MOTIONLESS', 'ALERT'].includes(status) ? status : 'IDLE';
		}

		function isNormalFirmwareStatus(value) {
			return normalizeFirmwareStatus(value) === 'IDLE';
		}

		function isTransitionFirmwareStatus(value) {
			const status = normalizeFirmwareStatus(value);
			return status === 'FALLING' || status === 'IMPACT' || status === 'MOTIONLESS';
		}

		function isCriticalFirmwareStatus(value) {
			return normalizeFirmwareStatus(value) === 'ALERT';
		}

		function hasCriticalVitalSigns(patient) {
			return hasMeasurementData(patient) && (patient.spo2 < 92 || patient.heartRate > 125);
		}

		function hasWarningVitalSigns(patient) {
			return hasMeasurementData(patient) && (patient.spo2 < 94 || patient.heartRate > 110 || patient.heartRate < 55 || patient.temp > 37.8);
		}

		function isMedicalCritical(patient) {
			return isCriticalFirmwareStatus(patient.status) || patient.fall === true || hasCriticalVitalSigns(patient);
		}

		function needsMedicalAttention(patient) {
			return isMedicalCritical(patient) || isTransitionFirmwareStatus(patient.status) || hasWarningVitalSigns(patient);
		}

		function firmwareStatusLabel(value) {
			const labels = {
				IDLE: 'Bình thường',
				FALLING: 'Đang ngã',
				IMPACT: 'Va chạm',
				MOTIONLESS: 'Bất động',
				ALERT: 'Té ngã xác nhận',
			};
			return labels[normalizeFirmwareStatus(value)] || labels.IDLE;
		}

		function firmwareStatusBadgeClass(value) {
			const classes = {
				IDLE: 'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200 dark:bg-emerald-500/10 dark:text-emerald-300 dark:ring-emerald-500/20',
				FALLING: 'bg-amber-50 text-amber-700 ring-1 ring-amber-200 dark:bg-amber-500/10 dark:text-amber-300 dark:ring-amber-500/20',
				IMPACT: 'bg-amber-50 text-amber-700 ring-1 ring-amber-200 dark:bg-amber-500/10 dark:text-amber-300 dark:ring-amber-500/20',
				MOTIONLESS: 'bg-amber-50 text-amber-700 ring-1 ring-amber-200 dark:bg-amber-500/10 dark:text-amber-300 dark:ring-amber-500/20',
				ALERT: 'bg-red-50 text-red-700 ring-1 ring-red-200 dark:bg-red-500/10 dark:text-red-300 dark:ring-red-500/20',
			};
			return classes[normalizeFirmwareStatus(value)] || classes.IDLE;
		}

		function normalizeFilterValue(value) {
			const filter = String(value || 'all').trim();
			return ['all', 'IDLE', 'FALLING', 'IMPACT', 'MOTIONLESS', 'ALERT'].includes(filter) ? filter : 'all';
		}

		function statusBadge(value) {
			const icon = isCriticalFirmwareStatus(value) ? 'triangle-alert' : isTransitionFirmwareStatus(value) ? 'circle-alert' : 'check-circle-2';
			return `<span class="inline-flex items-center gap-1.5 rounded-full px-3 py-1 text-xs font-bold ${firmwareStatusBadgeClass(value)}"><i data-lucide="${icon}" class="h-3.5 w-3.5"></i>${firmwareStatusLabel(value)}</span>`;
		}

		function iconCircle(name, tone = 'brand') {
			const theme = {
				brand: 'bg-brand-50 text-brand-700 dark:bg-brand-500/10 dark:text-brand-300',
				safe: 'bg-emerald-50 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-300',
				warning: 'bg-amber-50 text-amber-700 dark:bg-amber-500/10 dark:text-amber-300',

		function renderHistory() {
			const patient = currentPatient();
			if (!patient) return `<div class="card p-6 text-slate-700 dark:text-slate-200">Không có bệnh nhân được chọn.</div>`;
			const heartSeries = patient.history?.heartRate || [];
			const spo2Series = patient.history?.spo2 || [];
			const tempSeries = patient.history?.temp || [];
			const average = (series, digits = 0) => series.length ? (series.reduce((sum, value) => sum + Number(value || 0), 0) / series.length).toFixed(digits) : '---';
			const historyEvents = (patient.statusHistory || []).map((entry) => ({
				label: firmwareStatusLabel(entry.status),
				note: `Trạng thái firmware: ${normalizeFirmwareStatus(entry.status)}`,
				time: new Date(entry.at),
			}));
			(patient.timeline || []).forEach((entry) => historyEvents.push({ ...entry, time: new Date(entry.time) }));
			(patient.checkins || []).forEach((entry) => historyEvents.push({ label: entry.type, note: entry.place, time: new Date(entry.time) }));
			historyEvents.sort((left, right) => new Date(left.time) - new Date(right.time));
			return `
				<div class="space-y-5">
					<div class="card p-5 sm:p-6">
						<div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">

							</div>
						</div>
					</div>
					${state.historyLoading ? '<div class="card p-5 text-sm font-semibold text-brand-700"><span class="inline-flex items-center gap-2"><i data-lucide="loader-circle" class="h-4 w-4 animate-spin"></i>Đang tải dữ liệu lịch sử từ database...</span></div>' : ''}
					${state.historyError ? `<div class="ui-alert p-4 text-sm font-semibold text-red-700">${escapeHtml(state.historyError)}</div>` : ''}

							<div class="card p-5 sm:p-6">
								<div class="text-sm font-semibold text-slate-600 dark:text-slate-300">Dòng thời gian</div>

								<div class="mt-5 space-y-3">
									${historyEvents.slice().reverse().slice(0, 12).map((entry) => `
										<div class="flex items-start gap-3 rounded-xl bg-[rgb(var(--panel-2))] p-4">

											<div class="shrink-0 text-xs font-semibold text-slate-600 dark:text-slate-300">${formatDateTimeFull(entry.time)}</div>
										</div>
									`).join('') || '<div class="rounded-xl bg-[rgb(var(--panel-2))] p-4 text-sm text-slate-600 dark:text-slate-300">Chưa có bản ghi trạng thái.</div>'}
								</div>
							</div>
						</div>
						<div class="space-y-6">
							<div class="card p-5">
								<div class="text-sm font-semibold text-slate-600 dark:text-slate-300">Báo cáo</div>

								<div class="mt-5 space-y-4">
									${[
										['Nhịp tim trung bình', heartSeries.length ? `${average(heartSeries)} bpm` : 'Chưa có dữ liệu', heartSeries.length && (Number(average(heartSeries)) > 110 || Number(average(heartSeries)) < 55) ? 'danger' : 'safe'],
										['SpO₂ trung bình', spo2Series.length ? `${average(spo2Series)}%` : 'Chưa có dữ liệu', spo2Series.length && Number(average(spo2Series)) < 94 ? 'danger' : 'safe'],
										['Nhiệt độ trung bình', tempSeries.length ? `${average(tempSeries, 1)}°C` : 'Chưa có dữ liệu', tempSeries.length && Number(average(tempSeries, 1)) > 37.6 ? 'warning' : 'safe'],
										['Bản ghi trạng thái', historyEvents.length, historyEvents.some((entry) => /ALERT|Té ngã/i.test(entry.label)) ? 'danger' : 'brand'],
									].map(([label, value, tone]) => `
										<div class="rounded-xl bg-[rgb(var(--panel-2))] p-4">
											<div class="flex items-center justify-between gap-3"><div class="font-semibold text-slate-700 dark:text-slate-200">${label}</div><div class="text-right font-bold ${tone === 'safe' ? 'text-emerald-700 dark:text-emerald-300' : tone === 'danger' ? 'text-red-600 dark:text-red-300' : tone === 'warning' ? 'text-amber-700 dark:text-amber-300' : 'text-brand-700 dark:text-brand-300'}">${value}</div></div>
										</div>
									`).join('')}
								</div>
							</div>
						</div>
					</div>

		function renderAppShell(content) {

		function renderFloatingPanels() {

				<div ${toast.action ? `data-action="${toast.action}" data-id="${toast.patientId}" role="button"` : ''} class="notification-toast ${toast.tone === 'danger' ? 'notification-toast--danger' : toast.tone === 'warning' ? 'notification-toast--warning' : 'notification-toast--info'} w-[min(420px,calc(100vw-2rem))] rounded-[16px] p-4 ${toast.action ? 'cursor-pointer' : ''}">

						<div class="min-w-0 flex-1">

			const profileMenu = state.profileOpen ? `
				<div class="fixed right-4 top-20 z-50 w-[290px] rounded-[16px] border border-slate-200 bg-white p-3  dark:border-slate-800 dark:bg-slate-950  sm:right-6 lg:right-8">
