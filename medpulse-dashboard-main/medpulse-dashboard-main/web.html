			const notificationsPanel = state.notificationsOpen ? `
				<div class="notifications-panel fixed right-4 top-20 z-50 w-[340px] rounded-[16px] border border-slate-200 bg-white p-4  dark:border-slate-800 dark:bg-slate-950  sm:right-6 lg:right-8">
					<div class="flex items-center justify-between">
						<div>
							<div class="text-sm font-bold text-slate-800">Trung tâm thông báo</div>
							<div class="text-xl font-bold text-slate-950">${state.toastQueue.length} cảnh báo</div>
						</div>
						<button data-action="toggle-notifications" class="rounded-2xl p-2 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-900"><i data-lucide="x" class="h-4 w-4"></i></button>
					</div>
					<div class="mt-4 space-y-3 max-h-[60vh] overflow-auto pr-1 hide-scrollbar">
						${state.toastQueue.map((toast) => `
							<div ${toast.action ? `data-action="${toast.action}" data-id="${toast.patientId}" role="button"` : ''} class="rounded-[16px] ${toast.tone === 'danger' ? 'bg-red-50 dark:bg-red-500/10' : toast.tone === 'warning' ? 'bg-amber-50 dark:bg-amber-500/10' : 'bg-brand-50 dark:bg-brand-500/10'} p-4 ${toast.action ? 'cursor-pointer' : ''}">
								<div class="toast-title font-bold text-slate-950" style="color:#071c33 !important;">${toast.title}</div>
								<div class="toast-message mt-1 text-sm font-semibold leading-6 text-slate-800" style="color:#12395f !important; opacity:1 !important;">${toast.message}</div>
								<div class="toast-time mt-2 text-xs font-semibold text-slate-700" style="color:#365872 !important;">${formatTime(toast.time || new Date())}</div>
								${toast.action === 'open-registration' ? `<button data-action="open-registration" data-id="${toast.patientId}" class="ui-btn ui-btn-primary mt-3 !min-h-9 !px-3 !py-2 text-xs">Mở trang đăng ký</button>` : ''}
							</div>
						`).join('') || '<div class="rounded-[16px] bg-slate-50 p-4 text-sm font-medium text-slate-800">Không có thông báo mới</div>'}
					</div>
				</div>
			` : '';

			const alertModal = state.alertModal ? `
				<div class="fixed inset-0 z-[60] flex items-center justify-center bg-slate-950/60 px-4 py-6 ">
					<div class="w-full max-w-2xl rounded-[16px] border border-red-300 bg-white p-6   dark:border-red-500/20 dark:bg-slate-950">
						<div class="flex items-start gap-4">
							<div class="flex h-14 w-14 items-center justify-center rounded-[16px] bg-red-600 text-white pulse-critical"><i data-lucide="triangle-alert" class="h-7 w-7"></i></div>
							<div class="flex-1">
								<div class="text-sm font-semibold uppercase tracking-[0.16em] text-red-600">Cảnh báo khẩn cấp</div>
								<div class="mt-1 text-3xl font-bold tracking-tight text-slate-900 dark:text-white">${state.alertModal.patient.name}</div>
								<div class="mt-2 text-base leading-7 text-slate-600 dark:text-slate-300">${state.alertModal.type === 'critical' ? 'Phát hiện sự kiện y tế khẩn cấp: té ngã hoặc sinh hiệu bất thường.' : 'Cảnh báo cần kiểm tra ngay.'}</div>
								<div class="mt-4 grid gap-3 sm:grid-cols-3">
									<div class="rounded-[12px] bg-red-50 p-4 dark:bg-red-500/10"><div class="text-xs font-bold text-red-600">Thời gian</div><div class="mt-2 font-bold">${formatTime(state.alertModal.time)}</div></div>
									<div class="rounded-[12px] bg-red-50 p-4 dark:bg-red-500/10"><div class="text-xs font-bold text-red-600">Trạm</div><div class="mt-2 font-bold">${state.alertModal.kiosk}</div></div>
									<div class="rounded-[12px] bg-red-50 p-4 dark:bg-red-500/10"><div class="text-xs font-bold text-red-600">Phòng</div><div class="mt-2 font-bold">${state.alertModal.patient.room}</div></div>
								</div>
							</div>
							<button data-action="dismiss-alert" class="rounded-2xl p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-700 dark:hover:bg-slate-900 dark:hover:text-slate-200"><i data-lucide="x" class="h-5 w-5"></i></button>
						</div>
					</div>
				</div>
			` : '';

			const deleteModal = state.patientDeleteModal ? `
				<div class="fixed inset-0 z-[80] flex items-center justify-center bg-slate-950/60 px-4 py-6 backdrop-blur-sm">
					<div class="w-full max-w-lg overflow-hidden rounded-[20px] border border-red-200 bg-white shadow-2xl dark:border-red-500/20 dark:bg-slate-950">
						<div class="border-b border-red-100 bg-gradient-to-r from-red-50 to-white px-6 py-5 dark:border-red-500/20 dark:from-red-500/10 dark:to-slate-950">
							<div class="flex items-start gap-4"><div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl bg-red-600 text-white"><i data-lucide="trash-2" class="h-6 w-6"></i></div><div class="min-w-0 flex-1"><div class="text-xs font-bold uppercase tracking-[0.16em] text-red-600">Thao tác cần xác minh</div><div class="mt-1 text-2xl font-bold text-slate-900 dark:text-white">Xóa bệnh nhân</div><div class="mt-1 truncate text-sm font-semibold text-slate-600 dark:text-slate-300">${escapeHtml(state.patientDeleteModal.patientName)} · ${escapeHtml(state.patientDeleteModal.patientId)}</div></div><button data-action="close-delete-modal" class="rounded-xl p-2 text-slate-400 hover:bg-red-50 hover:text-red-700" ${state.patientDeletePending ? 'disabled' : ''}><i data-lucide="x" class="h-5 w-5"></i></button></div>
						</div>
						<div class="p-6">
							${state.patientDeleteModal.step === 'confirm' ? `
								<div class="rounded-2xl border border-red-200 bg-red-50 p-4 text-sm leading-6 text-red-800"><strong>Cảnh báo:</strong> Toàn bộ hồ sơ, lịch sử đo và liên kết BLE sẽ bị xóa. Thao tác này không thể hoàn tác.</div>
								<p class="mt-4 text-sm leading-6 text-slate-600">Mã xác nhận sẽ tự động gửi tới email Quản lý đã đăng ký trong hệ thống.</p><div class="mt-6 flex justify-end gap-3"><button data-action="close-delete-modal" class="ui-btn ui-btn-secondary" ${state.patientDeletePending ? 'disabled' : ''}>Hủy</button><button data-action="request-delete-otp" class="ui-btn border-red-700 bg-red-700 text-white hover:bg-red-800" ${state.patientDeletePending ? 'disabled' : ''}>${state.patientDeletePending ? 'Đang gửi...' : 'Gửi mã xác nhận'}</button></div>
							` : `
								<div class="text-center"><div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-50 text-brand-700"><i data-lucide="mail-check" class="h-7 w-7"></i></div><div class="mt-3 text-lg font-bold text-slate-900">Kiểm tra email của bạn</div><p class="mt-2 text-sm leading-6 text-slate-600">Nhập mã 5 ký tự đã gửi tới <strong>${escapeHtml(state.patientDeleteMaskedEmail)}</strong>. Mã hết hạn sau 5 phút.</p></div><input data-bind="patientDeleteOtp" data-no-render="true" value="${escapeHtml(state.patientDeleteOtp)}" maxlength="5" autocomplete="one-time-code" placeholder="ABCDE" class="mt-5 w-full rounded-xl border border-slate-300 px-4 py-4 text-center text-2xl font-bold uppercase tracking-[0.5em] text-slate-900 outline-none focus:border-red-500 focus:ring-4 focus:ring-red-100" />
								<div class="mt-6 flex justify-between gap-3"><button data-action="close-delete-modal" class="ui-btn ui-btn-secondary" ${state.patientDeletePending ? 'disabled' : ''}>Hủy</button><button data-action="confirm-delete-patient" class="ui-btn border-red-700 bg-red-700 text-white hover:bg-red-800" ${state.patientDeletePending ? 'disabled' : ''}>${state.patientDeletePending ? 'Đang xóa...' : 'Xác nhận xóa'}</button></div>
							`}
							${state.patientDeleteError ? `<div class="mt-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-semibold text-red-700"><i data-lucide="circle-alert" class="mr-2 inline h-4 w-4"></i>${escapeHtml(state.patientDeleteError)}</div>` : ''}
						</div>
					</div>
				</div>
			` : '';

			return `
				${profileMenu}
				${notificationsPanel}
				${alertModal}
				${deleteModal}
				<div class="fixed bottom-4 right-4 z-[70] flex flex-col items-end gap-3 sm:bottom-6 sm:right-6 lg:bottom-8 lg:right-8">
					${notifications}
				</div>
			`;
		}

		function escapeHtml(value) {
			return String(value || '')
				.replaceAll('&', '&amp;')
				.replaceAll('<', '&lt;')
				.replaceAll('>', '&gt;')
				.replaceAll('"', '&quot;')
				.replaceAll("'", '&#39;');
		}

		function render() {
			const app = document.getElementById('app');
			const activeEl = document.activeElement;
			const activeBindKey = activeEl?.dataset?.bind || null;
			const activeCursor = activeEl?.selectionStart ?? null;
			const contentMap = {
				dashboard: renderOverview(),
				patients: renderPatients(),
				detail: renderPatientDetail(),
				history: renderHistory(),
				register: renderPatientRegistration(),
				settings: renderSettings(),
			};

			let output;
			if (!state.authed) {
				output = state.screen === 'login' ? renderLogin() : renderLanding();
			} else {
				output = renderAppShell(contentMap[state.view] || renderOverview());
			}

			if (state.loading) {
				output = `
					<div class="min-h-screen px-4 py-6 sm:px-6 lg:px-8">
						<div class="card mx-auto max-w-7xl rounded-[16px] p-6 ">
							<div class="grid gap-4 md:grid-cols-4">
								${Array.from({ length: 8 }).map(() => `
									<div class="rounded-[16px] border border-slate-200 p-5 dark:border-slate-800">
										<div class="skeleton  h-4 w-1/2 rounded-full"></div>
										<div class="skeleton  mt-4 h-8 w-2/3 rounded-full"></div>
										<div class="skeleton  mt-3 h-3 w-full rounded-full"></div>
										<div class="skeleton  mt-2 h-3 w-5/6 rounded-full"></div>
									</div>
								`).join('')}
							</div>
						</div>
					</div>
				`;
			}

			app.innerHTML = output;
			applyTheme();
			if (window.lucide) lucide.createIcons();
			bindEvents();

			if (activeBindKey) {
				const restored = app.querySelector(`[data-bind="${activeBindKey}"]`);
				if (restored) {
					restored.focus();
					try { restored.setSelectionRange(activeCursor, activeCursor); } catch(e) {}
				}
			}
		}

		function applyTheme() {
			document.documentElement.classList.remove('dark');
			localStorage.removeItem('medpulse-theme');
		}

		function showToast(title, message, tone = 'info') {
			const toast = { id: `${Date.now()}-${Math.random().toString(16).slice(2)}`, title, message, tone, time: new Date() };
			state.toastQueue.unshift(toast);
			state.toastQueue = state.toastQueue.slice(0, 5);
			render();
			setTimeout(() => {
				state.toastQueue = state.toastQueue.filter((item) => item.id !== toast.id);
				render();
			}, 4200);
		}

		function bindEvents() {
			const app = document.getElementById('app');
			const birthPartKeys = {
				day: 'registrationBirthDay',
				month: 'registrationBirthMonth',
				year: 'registrationBirthYear',
			};
			const birthParts = [...app.querySelectorAll('[data-birth-part]')];
			birthParts.forEach((element, index) => {
				element.addEventListener('input', () => {
					const part = element.dataset.birthPart;
					const maxLength = part === 'year' ? 4 : 2;
					element.value = element.value.replace(/\D/g, '').slice(0, maxLength);
					state[birthPartKeys[part]] = element.value;
					const calculatedAge = syncRegistrationBirthDate();
					const ageInput = app.querySelector('#registration-age');
					const ageHelp = app.querySelector('#registration-age-help');
					if (ageInput) {
						ageInput.value = calculatedAge === null ? state.registrationAge : String(calculatedAge);
						ageInput.readOnly = calculatedAge !== null;
					}
					if (ageHelp) ageHelp.textContent = calculatedAge === null ? 'Có thể nhập tuổi nếu không biết ngày sinh.' : 'Được tự động tính từ ngày sinh.';
					if (element.value.length === maxLength && birthParts[index + 1]) birthParts[index + 1].focus();
				});
				element.addEventListener('keydown', (event) => {
					if (event.key === 'Backspace' && !element.value && birthParts[index - 1]) birthParts[index - 1].focus();
				});
			});
			app.querySelectorAll('[data-bind]').forEach((element) => {
				element.addEventListener('input', (event) => {
					const key = element.dataset.bind;
					if (key === 'patientDeleteOtp') {
						event.target.value = event.target.value.toUpperCase().replace(/[^A-Z2-9]/g, '').slice(0, 5);
					}
					state[key] = key === 'pageSize' ? Number(event.target.value) : event.target.value;
					if (element.dataset.noRender === 'true') return;
					if (['search', 'filter', 'sort', 'pageSize'].includes(key)) state.page = 1;
					render();
				});
			});
			app.querySelectorAll('select[data-bind]').forEach((element) => {
				element.addEventListener('change', (event) => {
					const key = element.dataset.bind;
					state[key] = key === 'pageSize' ? Number(event.target.value) : event.target.value;
					if (['filter', 'sort', 'pageSize'].includes(key)) state.page = 1;
					render();
				});
			});
			app.querySelectorAll('[data-action]').forEach((element) => {
				element.addEventListener('click', (event) => {
					if (event.target.closest('[data-action]') !== element) return;
					const action = element.dataset.action;
						if (action === 'dismiss-toast') event.stopPropagation();
					const view = element.dataset.view;
					const id = element.dataset.id;
					const range = element.dataset.range;
					const page = element.dataset.page;
					if (action === 'show-login') {
						state.screen = 'login';
						render();
					}
					if (action === 'show-landing') {
						state.screen = 'landing';
						state.authed = false;
						render();
					}
					if (action === 'demo-login') {
						if (state.screen !== 'login' && !state.inputName && !state.loginPin) {
							state.screen = 'login';
							render();
						} else {
							loginToBackend();
						}
					}
					if (action === 'fill-demo') {
						state.inputName = DEMO_LOGIN_USER;
						state.loginPin = DEMO_LOGIN_PASSWORD;
						state.loginError = '';
						render();
					}
					if (action === 'toggle-sidebar') {
						state.sidebarOpen = !state.sidebarOpen;
						render();
					}
					if (action === 'toggle-profile') {
						state.profileOpen = !state.profileOpen;
						state.notificationsOpen = false;
						render();
					}
					if (action === 'toggle-notifications') {
						state.notificationsOpen = !state.notificationsOpen;
						state.profileOpen = false;
						render();
					}
					if (action === 'switch-view' && view) {
						state.view = view;
						state.profileOpen = false;
						state.notificationsOpen = false;
						state.sidebarOpen = window.innerWidth >= 1024;
						if (view === 'detail' && !state.selectedPatientId && patients.length > 0) state.selectedPatientId = patients[0].id;
						if (view === 'history') loadSelectedPatientHistory();
						else render();
					}
					if (action === 'open-patient' && id) {
						state.selectedPatientId = id;
						state.selectedBleDeviceId = '';
						state.view = 'detail';
						state.profileOpen = false;
						state.notificationsOpen = false;
						render();
					}
					if (action === 'link-ble-device') {
						linkSelectedBleDevice();
					}
					if (action === 'start-ble-session') {
						runBleDeviceAction('start');
					}
					if (action === 'end-ble-session') {
						runBleDeviceAction('end');
					}
					if (action === 'unlink-ble-device') {
						runBleDeviceAction('unlink');
					}
					if (action === 'buzzer-on') sendWearableCommand('BUZZER_ON');
					if (action === 'buzzer-off') sendWearableCommand('BUZZER_OFF');
					if (action === 'buzzer-test') sendWearableCommand('BUZZER_TEST');
					if (action === 'delete-patient') {
						openPatientDeleteModal();
					}
					if (action === 'close-delete-modal') closePatientDeleteModal();
					if (action === 'request-delete-otp') requestPatientDeleteOtp();
					if (action === 'confirm-delete-patient') confirmPatientDeletion();
					if (action === 'open-registration' && id) {
						openPatientRegistration(id);
					}
					if (action === 'toggle-birth-picker') {
						state.registrationDatePickerOpen = !state.registrationDatePickerOpen;
						render();
						if (state.registrationDatePickerOpen) setTimeout(() => document.querySelector('[data-action="select-birth-year"][aria-selected="true"]')?.scrollIntoView({ block: 'center' }), 0);
					}
					if (action === 'close-birth-picker') {
						state.registrationDatePickerOpen = false;
						render();
					}
					if (action === 'select-birth-day' || action === 'select-birth-month' || action === 'select-birth-year') {
						const key = action === 'select-birth-day' ? 'registrationBirthDay' : action === 'select-birth-month' ? 'registrationBirthMonth' : 'registrationBirthYear';
						state[key] = String(element.dataset.value || '');
						syncRegistrationBirthDate();
						render();
						setTimeout(() => document.querySelector('[data-action="select-birth-year"][aria-selected="true"]')?.scrollIntoView({ block: 'center' }), 0);
					}
					if (action === 'submit-registration') {
						submitPatientRegistration();
					}
					if (action === 'paginate' && page) {
						state.page = Number(page);
						render();
					}
					if (action === 'export-pdf') {
						window.print();
					}
					if (action === 'simulate-alert') {
						enqueueAlert(currentPatient(), 'critical', { showModal: true });
					}
					if (action === 'open-toast') {
						showToast('Synced', 'Dữ liệu realtime vừa được cập nhật từ MQTT.', 'info');
					}
					if (action === 'dismiss-alert') {
						state.alertModal = null;
						render();
					}
					if (action === 'dismiss-toast' && id) {
						state.toastQueue = state.toastQueue.filter((toast) => toast.id !== id);
						render();
					}
					if (action === 'toggle-sound') {
						state.soundEnabled = !state.soundEnabled;
						render();
					}
					if (action === 'set-range' && range) {
						state.historyRange = range;
						loadSelectedPatientHistory();
					}
					if (action === 'logout') {
						if (state.authToken) {
							apiFetch(`${BACKEND_BASE_URL}/api/auth/logout`, { method: 'POST' }).catch(() => {});
						}
						logoutLocal();
					}
					event.preventDefault();
				});
			});
		}

		function bootstrap() {
			const saved = localStorage.getItem(STORAGE_KEY);
			if (saved) {
				try {
					const parsed = JSON.parse(saved);
					Object.assign(state, parsed);
					state.filter = normalizeFilterValue(state.filter);
					state.loading = true;
					if (state.authed && !state.authToken) {
						state.authed = false;
						state.screen = 'login';
					}
				} catch (error) {
				}
			}
			applyTheme();
			render();
			setTimeout(() => {
				state.loading = false;
				if (!state.authed) {
					state.screen = 'landing';
				}
				render();
			}, 900);
		document.addEventListener('click', (event) => {
				if (!event.target.closest('[data-action="toggle-profile"]')) {
					state.profileOpen = false;
				}
				if (!event.target.closest('[data-action="toggle-notifications"]')) {
					if (!event.target.closest('.fixed.right-4.top-20') && !event.target.closest('.fixed.right-6.top-20') && !event.target.closest('.fixed.right-8.top-20')) {
						state.notificationsOpen = false;
					}
				}
			});
			window.addEventListener('keydown', (event) => {
				if (event.key === 'Escape') {
					state.profileOpen = false;
					state.notificationsOpen = false;
					state.alertModal = null;
					render();
				}
			});
			let desktopLayout = window.innerWidth >= 1024;
			window.addEventListener('resize', () => {
				const nextDesktopLayout = window.innerWidth >= 1024;
				if (nextDesktopLayout === desktopLayout) return;
				desktopLayout = nextDesktopLayout;
				state.sidebarOpen = nextDesktopLayout;
				if (state.authed) render();
			});
		}


		// WebSocket globals (phải ở scope ngoài để setInterval truy cập được)
		const IS_LOCAL_BACKEND = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
		const BACKEND_BASE_URL = IS_LOCAL_BACKEND ? 'http://localhost:5000' : window.location.origin;
		const BACKEND_WS_URL = IS_LOCAL_BACKEND
			? 'ws://localhost:5000'
			: `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}`;
		let socket = null;
		let reconnectTimer = null;

		function authHeaders(extraHeaders = {}) {
			return state.authToken
				? { ...extraHeaders, Authorization: `Bearer ${state.authToken}` }
				: { ...extraHeaders };
		}

		async function apiFetch(url, options = {}) {
			const response = await fetch(url, {
				...options,
				headers: authHeaders(options.headers || {}),
			});
			if (response.status === 401) {
				state.authed = false;
				state.authToken = '';
				state.authUser = null;
				state.screen = 'login';
				state.loginError = 'Phiên đăng nhập đã hết hạn. Vui lòng đăng nhập lại.';
				render();
			}
			return response;
		}

		function logoutLocal() {
			state.authed = false;
			state.authToken = '';
			state.authUser = null;
			state.screen = 'landing';
			state.profileOpen = false;
			state.notificationsOpen = false;
			if (socket) {
				try { socket.close(); } catch (error) {}
			}
			render();
		}

		async function loginToBackend() {
			if (state.loginPending) return;
			const email = String(state.inputName || '').trim();
			const password = String(state.loginPin || '');
			if (!email || !password) {
				state.loginError = 'Cần nhập email và mật khẩu.';
				render();
				return;
			}
			state.loginPending = true;
			state.loginError = '';
			render();
			try {
				const response = await fetch(`${BACKEND_BASE_URL}/api/auth/login`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ email, password }),
				});
				const payload = await response.json().catch(() => ({}));
				if (!response.ok) throw new Error(payload.error || 'Không thể đăng nhập');
				state.authToken = payload.token || '';
				state.authUser = payload.user || null;
				state.currentUserRole = payload.user?.role || state.currentUserRole;
				state.authed = true;
				state.screen = 'app';
				state.loading = true;
				state.sidebarOpen = window.innerWidth >= 1024;
				state.profileOpen = false;
				state.notificationsOpen = false;
				state.loginPin = '';
				fetchInitialPatients();
			} catch (error) {
				state.loginError = error.message;
			}
			state.loginPending = false;
			render();
		}

		// ===== FUNCTION: Fetch initial patient data from HTTP API =====
		function isEmptyPatient(patient) {
			// Check if patient has meaningful data (not just default/mock data)
			const hasName = patient.name && patient.name.trim() !== '' && !patient.name.startsWith('RFID-');
			const hasVitals = patient.heartRate !== 75 || patient.spo2 !== 98 || patient.temp !== 36.5;
			const hasActivity = patient.alert || patient.signalLost || patient.status !== 'IDLE';
			return !hasName && !hasVitals && !hasActivity;
		}

		function isDefaultPatientData(patient) {
			// Kiểm tra xem dữ liệu có phải là mặc định ảo hay thực từ MQTT
			// Mặc định: heartRate=75, spo2=98, temp=36.5, battery=100, rssi=-55
			const isDefault = patient.heartRate === 75 
				&& patient.spo2 === 98 
				&& patient.temp === 36.5 
				&& patient.battery === 100 
				&& patient.rssi === -55
				&& (!patient.history || !patient.history.heartRate || patient.history.heartRate.length === 0);
			return isDefault;
		}

		async function fetchInitialPatients() {
			try {
				console.log('📥 Fetching initial patient data from API...');
				const response = await fetch(`${BACKEND_BASE_URL}/api/patients`);
				if (!response.ok) throw new Error(`API error: ${response.status}`);

				const allPatientsFromBackend = await response.json();
				console.log('📋 Raw backend data:', allPatientsFromBackend);

				// Filter out empty/mock patients - keep only those with actual data
				const activePatients = allPatientsFromBackend.filter(p => !isEmptyPatient(p));
				console.log(`✅ Filtered ${activePatients.length} active patients from ${allPatientsFromBackend.length} total`);

				// Map backend data to UI format
				patients = activePatients.map(remotePatient => {
					const patientName = remotePatient.fullName || remotePatient.name || remotePatient.id || 'Unknown';
					const isDefaultData = isDefaultPatientData(remotePatient);
					const hasRealData = remotePatient.hasRealData === true || Boolean(remotePatient.lastMeasurementAt) || !isDefaultData;
					const lastMeasurementAt = remotePatient.lastMeasurementAt || (hasRealData ? remotePatient.lastUpdate : null);
					const lastUpdate = lastMeasurementAt || remotePatient.lastUpdate || Date.now();
					return {
						...remotePatient,
						avatar: patientName.split(' ').slice(-2).map(p => p[0]).join('').toUpperCase() || 'P',
						name: patientName,
						room: remotePatient.roomNumber || remotePatient.room || '---',
						kiosk: remotePatient.kiosk || 'Kiosk 01',
						status: remotePatient.status || remotePatient.current_status || 'IDLE',
						alertLevel: remotePatient.alertLevel || 'safe',
						lastUpdate: new Date(lastUpdate),
						lastMeasurementAt,
						// Nếu dữ liệu là mặc định ảo, chỉ khởi tạo mảy trống. Chờ MQTT gửi dữ liệu thực
						history: !hasRealData 
							? { heartRate: [], spo2: [], temp: [] }
							: remotePatient.history || { heartRate: [remotePatient.heartRate || 75], spo2: [remotePatient.spo2 || 98], temp: [remotePatient.temp || 36.5] },
						hasRealData,
						checkins: [{ type: hasRealData ? 'Latest measurement' : 'Check-in', time: new Date(lastUpdate), place: remotePatient.room || 'Room N/A' }],
						timeline: [{ label: 'Hệ thống khởi tạo', time: new Date(remotePatient.lastUpdate || Date.now()), note: 'Bệnh nhân được tải từ cơ sở dữ liệu' }],
						riskScore: remotePatient.riskScore || 4,
						alert: (remotePatient.status || remotePatient.current_status || 'IDLE') !== 'IDLE',
						fall: remotePatient.fall || false,
						signalLost: remotePatient.signalLost || false,
						safe: remotePatient.safe !== false,
						zone: (remotePatient.status || remotePatient.current_status || 'IDLE') === 'IDLE' ? 'Within zone' : 'Alert zone',
						battery: remotePatient.battery || 100,
						rssi: remotePatient.rssi || -60,
						ble: patientConnectionText(remotePatient),
						age: remotePatient.age || 0,
						gender: remotePatient.gender || '',
						bloodType: remotePatient.bloodType || 'O+',
					};
				});

				try {
					await fetchBleInfrastructure();
				} catch (bleError) {
					console.error('Không thể đồng bộ BLE/stations:', bleError);
				}

				console.log(`🟢 Loaded ${patients.length} patients into dashboard`);
				state.loading = false;

				if (patients.length === 0) {
					showToast('Hệ thống trực tuyến', 'Chưa có bệnh nhân. Vui lòng quẹt thẻ RFID để khởi tạo.', 'info');
				} else {
					showToast('Chào mừng', `Đăng nhập thành công! Đã tải ${patients.length} bệnh nhân từ cơ sở dữ liệu.`, 'info');
					if (!state.selectedPatientId && patients.length > 0) {
						state.selectedPatientId = patients[0].id;
					}
				}

				render();
				// Initialize WebSocket after fetching initial data
				initMedPulseWebSocket();
			} catch (error) {
				console.error('❌ Lỗi khi tải dữ liệu bệnh nhân:', error.message);
				showToast('Lỗi kết nối', 'Không thể tải dữ liệu từ server. ' + error.message, 'danger');
				state.loading = false;
				render();
			}
		}

		function initMedPulseWebSocket() {
			if (socket && socket.readyState !== WebSocket.CLOSED) return;
			try { socket && socket.close(); } catch(e) {}

			socket = new WebSocket(BACKEND_WS_URL);

			socket.onopen = () => {
				console.log('🟢 WebSocket kết nối thành công tới Backend!');
				state.mqttStatus = 'connected';
				state.wifiStatus = 'stable';
				clearTimeout(reconnectTimer);
				render();
			};

				socket.onmessage = (event) => {
				try {
					const rawPayload = JSON.parse(event.data);

					if (rawPayload.type === 'BLE_DEVICES_SYNC') {
						state.bleDevices = [];
						(rawPayload.data || []).forEach(upsertBleDevice);
						render();
						return;
					}

					if (['BLE_DEVICE_UPDATE', 'BLE_DEVICE_SEEN', 'BLE_DEVICE_LOST', 'BLE_DEVICE_ALERT', 'BLE_SESSION_ENDED', 'BLE_SESSION_STARTED', 'BLE_VITALS_ACCEPTED', 'BLE_VITALS_REJECTED', 'BLE_GATT_EVENT', 'DIRECT_DEVICE_STATUS', 'DIRECT_DEVICE_EVENT'].includes(rawPayload.type)) {
						const previous = state.bleDevices.find(item => item.deviceId === rawPayload.data?.deviceId);
						const device = upsertBleDevice(rawPayload.data);
						const linkedPatient = device?.patientId
							? patients.find(patient => patient.id === device.patientId)
							: null;
						if (device && rawPayload.type === 'BLE_DEVICE_ALERT' && previous?.status !== 'ALERT') {
							playAlertTone();
							showToast('Cảnh báo mất kết nối thiết bị', `${device.patientName || device.patientId || device.deviceId} đã mất BLE quá 180 giây.`, 'danger');
						} else if (device && isWearableFallAlert(device)
							&& (previous?.lastEvent !== device.lastEvent || previous?.status !== 'ALERT')) {
							playAlertTone();
							if (linkedPatient) {
								enqueueAlert({
									...linkedPatient,
									status: 'ALERT',
									fall: true,
									safe: false,
									alert: true,
									sourceDeviceId: device.deviceId,
									sourceStationId: device.activeTransport === 'DIRECT_MQTT' ? null : device.stationId,
								}, 'critical', { showModal: true, cooldownMs: 20000 });
							}
							showToast('Cảnh báo té ngã từ thiết bị đeo',
								device.patientName || device.patientId
									? `${device.patientName || device.patientId} · ${device.deviceId}`
									: `${device.deviceId} báo té ngã nhưng chưa liên kết với bệnh nhân/phiên theo dõi.`,
								'danger');
						} else if (device && isWearablePreAlert(device) && previous?.lastEvent !== device.lastEvent) {
							showToast('Nghi té ngã từ thiết bị đeo',
								device.patientName || device.patientId
									? `${device.patientName || device.patientId} · đang theo dõi bất động.`
									: `${device.deviceId} báo nghi té ngã.`,
								'warning');
						} else if (device && rawPayload.type === 'BLE_VITALS_REJECTED') {
							showToast('Gói BLE chưa được lưu', device.lastEvent === 'VITALS_REJECTED_UNASSIGNED'
								? `${device.deviceId} chưa được gán cho bệnh nhân.`
								: `Phiên đo của ${device.deviceId} chưa hoạt động.`, 'warning');
						} else if (device && device.lastEvent?.endsWith('HARDWARE_FAULT') && previous?.sensorReady !== false) {
							playAlertTone();
							showToast('Lỗi cảm biến thiết bị đeo', `${device.deviceId} mất kết nối MPU6050 nhưng kênh liên lạc vẫn hoạt động.`, 'danger');
						} else if (device && device.lastEvent?.endsWith('HARDWARE_RECOVERED') && previous?.sensorReady === false) {
							showToast('Cảm biến đã phục hồi', `${device.deviceId} đã kết nối lại MPU6050.`, 'info');
						} else {
							render();
						}
						return;
					}

					if (rawPayload.type === 'STATIONS_SYNC') {
						state.stations = [];
						(rawPayload.data || []).forEach(upsertStation);
						render();
						return;
					}

					if (rawPayload.type === 'STATION_UPDATE') {
						upsertStation(rawPayload.data);
						render();
						return;
					}

					if (rawPayload.type === 'PENDING_REGISTRATIONS') {
						state.pendingRegistrations = [];
						(rawPayload.data || []).forEach(entry => upsertPendingRegistration(entry, true));
						const pendingIds = new Set(state.pendingRegistrations.map(entry => entry.id));
						state.toastQueue = state.toastQueue.filter(toast => toast.action !== 'open-registration' || pendingIds.has(toast.patientId));
						render();
						return;
					}

					if (rawPayload.type === 'UNKNOWN_PATIENT_DETECTED') {
						upsertPendingRegistration(rawPayload.data, true);
						render();
						return;
					}

					if (rawPayload.type === 'DEVICE_COMMANDS_SYNC') {
						state.deviceCommands = [];
						(rawPayload.data || []).forEach(upsertDeviceCommand);
						render();
						return;
					}

					if (rawPayload.type === 'DEVICE_COMMAND_UPDATE') {
						const command = upsertDeviceCommand(rawPayload.data);
						if (command && ['EXECUTED', 'FAILED', 'EXPIRED'].includes(command.status)) {
							showToast(command.status === 'EXECUTED' ? 'Thiết bị đã thực thi lệnh' : 'Lệnh thiết bị không thành công', `${command.action} · ${commandStatusLabel(command.status)}`, command.status === 'EXECUTED' ? 'info' : 'danger');
						} else render();
						return;
					}

					if (rawPayload.type === 'DEVICE_TRANSPORT_UPDATE') {
						if (rawPayload.data?.deviceId) state.deviceTransports[rawPayload.data.deviceId] = rawPayload.data;
						render();
						return;
					}

					if (rawPayload.type === 'DEVICE_TRANSPORTS_SYNC') {
						state.deviceTransports = {};
						(rawPayload.data || []).forEach(item => {
							if (item?.deviceId) state.deviceTransports[item.deviceId] = item;
						});
						render();
						return;
					}

					if (rawPayload.type === 'PATIENT_DELETED') {
						const deletedId = rawPayload.data?.id;
						patients = patients.filter(patient => patient.id !== deletedId);
						state.bleDevices = state.bleDevices.map(device => device.patientId === deletedId
							? { ...device, patientId: null, patientName: null, sessionActive: false, sessionBlocked: false, status: 'OFFLINE' }
							: device);
						if (state.selectedPatientId === deletedId) {
							state.selectedPatientId = patients[0]?.id || null;
							state.view = 'patients';
						}
						render();
						return;
					}

// 1. Đồng bộ ban đầu khi load trang (via WebSocket)
					if (rawPayload.type === 'INITIAL_SYNC') {
						// Filter out empty patients from WebSocket sync
						if (!rawPayload.data || rawPayload.data.length === 0) {
							console.log('ℹ️  WebSocket INITIAL_SYNC: No patients data received');
						} else {
							const validPatients = rawPayload.data.filter(p => !isEmptyPatient(p));
							console.log(`📡 WebSocket INITIAL_SYNC: Received ${validPatients.length} active patients from ${rawPayload.data.length} total`);
							
							validPatients.forEach(remotePatient => {
								const existingIdx = patients.findIndex(p => p.id === remotePatient.id);
								const patientName = remotePatient.fullName || remotePatient.name || remotePatient.id;
								const isDefaultData = isDefaultPatientData(remotePatient);
								const hasRealData = remotePatient.hasRealData === true || Boolean(remotePatient.lastMeasurementAt) || !isDefaultData;
								const lastMeasurementAt = remotePatient.lastMeasurementAt || (hasRealData ? remotePatient.lastUpdate : null);
								const lastUpdate = lastMeasurementAt || remotePatient.lastUpdate || Date.now();
								const mapped = {
									...remotePatient,
									avatar: patientName.split(' ').slice(-2).map(p => p[0]).join('').toUpperCase() || 'P',
									name: patientName,
									room: remotePatient.roomNumber || remotePatient.room || '---',
									lastUpdate: new Date(lastUpdate),
									lastMeasurementAt,
									hasRealData,
									// Chỉ dùng lịch sử thực, không tạo dữ liệu ảo
									history: {
										heartRate: (remotePatient.history?.heartRate && remotePatient.history.heartRate.length > 0) ? remotePatient.history.heartRate : [],
										spo2: (remotePatient.history?.spo2 && remotePatient.history.spo2.length > 0) ? remotePatient.history.spo2 : [],
										temp: (remotePatient.history?.temp && remotePatient.history.temp.length > 0) ? remotePatient.history.temp : [],
									},
								};
								if (existingIdx !== -1) {
									Object.assign(patients[existingIdx], mapped);
								} else {
									patients.push(mapped);
								}
							});
						}
						render();
						return;
					}

					// 2. Cập nhật thời gian thực từ ESP32
					if (rawPayload.type === 'PATIENT_UPDATE') {
						const liveData = rawPayload.data;
						const firmwareStatus = normalizeFirmwareStatus(liveData.status || liveData.current_status);
						const index = patients.findIndex(p => p.id === liveData.id);
						const incomingMeasurementAt = liveData.lastMeasurementAt || null;
						const incomingHasMeasurement = liveData.hasRealData === true && Boolean(incomingMeasurementAt);
						const liveUpdateAt = liveData.lastUpdate || incomingMeasurementAt || new Date().toISOString();

						if (index === -1) {
						// Bệnh nhân MỚI → Append
						const newPatient = {
						...liveData,
						name: liveData.fullName || liveData.name || liveData.id,
						room: liveData.roomNumber || liveData.room || '---',
						avatar: (liveData.fullName || liveData.name || liveData.id).split(' ').slice(-2).map(p => p[0]).join('').toUpperCase(),
						status: firmwareStatus,
						lastUpdate: new Date(liveUpdateAt),
						lastMeasurementAt: incomingMeasurementAt,
						hasRealData: incomingHasMeasurement,
						history: incomingHasMeasurement
							? { heartRate: [liveData.heartRate], spo2: [liveData.spo2], temp: [liveData.temp] }
							: { heartRate: [], spo2: [], temp: [] },
						checkins: incomingHasMeasurement ? [{ type: 'Check-in', time: new Date(incomingMeasurementAt), place: liveData.roomNumber || liveData.room || '---' }] : [],
						timeline: [{ label: 'Khởi tạo trạm', time: new Date(), note: 'Bệnh nhân quẹt thẻ RFID thành công' }],
						riskScore: liveData.riskScore || 0,
						alert: firmwareStatus !== 'IDLE',
						fall: firmwareStatus === 'ALERT',
						signalLost: !!liveData.signalLost,
						safe: firmwareStatus === 'IDLE',
						kiosk: liveData.kiosk || 'Kiosk 01',
						zone: firmwareStatus === 'IDLE' ? 'Within zone' : 'Alert zone',
						battery: liveData.battery || 100,
						rssi: liveData.rssi || -60,
						ble: patientConnectionText(liveData),
						age: liveData.age || 0,
						gender: liveData.gender || '',
						};
						patients.push(newPatient);
						showToast('Bệnh nhân mới', `${newPatient.name} – ${newPatient.room} vừa được kết nối.`, 'info');
						if (!state.selectedPatientId) state.selectedPatientId = newPatient.id;
						} else {
						// Bệnh nhân ĐÃ CÓ → chỉ thêm history khi thực sự có lần đo mới
						const oldData = patients[index];
						const isNewMeasurement = incomingHasMeasurement
							&& incomingMeasurementAt !== oldData.lastMeasurementAt;
						patients[index] = {
						...oldData,
						...liveData,
						name: liveData.fullName || liveData.name || oldData.name,
						room: liveData.roomNumber || liveData.room || oldData.room,
						status: firmwareStatus,
						history: isNewMeasurement ? {
						heartRate: [...(oldData.history?.heartRate || []).slice(-29), liveData.heartRate],
						spo2:      [...(oldData.history?.spo2 || []).slice(-29),      liveData.spo2],
						temp:      [...(oldData.history?.temp || []).slice(-29),      liveData.temp],
						} : (oldData.history || { heartRate: [], spo2: [], temp: [] }),
						lastUpdate: new Date(liveUpdateAt),
						lastMeasurementAt: incomingMeasurementAt || oldData.lastMeasurementAt || null,
						hasRealData: incomingHasMeasurement || oldData.hasRealData === true,
						alert: firmwareStatus !== 'IDLE',
						fall: firmwareStatus === 'ALERT',
						safe: firmwareStatus === 'IDLE',
						zone: firmwareStatus === 'IDLE' ? 'Within zone' : 'Alert zone',
						ble: patientConnectionText({ ...oldData, ...liveData }),
						};
						if (firmwareStatus === 'ALERT') {
						enqueueAlert(patients[index], 'critical', { showModal: true, cooldownMs: 20000 });
						} else if (isTransitionFirmwareStatus(firmwareStatus)) {
						enqueueAlert(patients[index], 'warning', { showModal: false, cooldownMs: 30000 });
						} else if (liveData.signalLost) {
						showToast('Không có dữ liệu mới từ trạm', `${patients[index].name} chưa gửi thêm gói MQTT.`, 'warning');
						}
						}
						render();
					}
				} catch (error) {
					console.error('❌ Lỗi xử lý WebSocket:', error);
				}
			};

			socket.onclose = () => {
				console.warn('🔴 Mất kết nối WebSocket. Thử lại sau 5 giây...');
				state.mqttStatus = 'degraded';
				state.wifiStatus = 'unstable';
				render();
				clearTimeout(reconnectTimer);
				reconnectTimer = setTimeout(initMedPulseWebSocket, 5000);
			};

			socket.onerror = (err) => {
				console.error('❌ Lỗi WebSocket:', err);
			};
		}

		// Lưu localStorage + giữ kết nối WebSocket khi đã đăng nhập
		setInterval(() => {
			if (state.authed) {
				localStorage.setItem(STORAGE_KEY, JSON.stringify({
					authed: state.authed,
					screen: state.screen,
					view: state.view,
					selectedPatientId: state.selectedPatientId,
					soundEnabled: state.soundEnabled,
					historyRange: state.historyRange,
					authToken: state.authToken,
					authUser: state.authUser,
					currentUserRole: state.currentUserRole,
				}));
				if (!socket || socket.readyState === WebSocket.CLOSED) {
					initMedPulseWebSocket();
				}
				if (refreshStationFreshness()) render();
			}
		}, 2600);


		bootstrap();
	</script>
</body>
</html>
